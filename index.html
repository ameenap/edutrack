      baseData = { mode, campusId, batchIds: selectedBatchIds, subjectId, courseId, workTypeIds: selectedWorkTypes, date, startTime, endTime, status, chapter, notes };
    } else {
      const subjectId = document.getElementById('f-subject-online')?.value;
      const courseId = document.getElementById('f-course-online')?.value;
      const isMulti = document.getElementById('f-multidate')?.checked;
      const dates = isMulti ? [...selectedMultiDates].sort() : [document.getElementById('f-date-online')?.value];
      const startTime = document.getElementById('f-start-online')?.value;
      const endTime = document.getElementById('f-end-online')?.value;
      const status = document.getElementById('f-status-online')?.value || 'Scheduled';
      const chapter = document.getElementById('f-chapter-online')?.value || '';
      const notes = document.getElementById('f-notes-online')?.value || '';
      
      console.log('Online form data:', {dates, subjectId, courseId, startTime, endTime});
      
      // Detailed validation
      if (!facultyIds.length) {
        toast('❌ Please select at least one faculty member', 'error');
        return;
      }
      if (dates.length === 0 || dates[0] === '') {
        toast('❌ Please select at least one date', 'error');
        return;
      }
      
      baseData = { mode, batchIds: selectedBatchIds, subjectId, courseId, workTypeIds: selectedWorkTypes, dates, date: dates[0], startTime, endTime, status, chapter, notes };
    }

    console.log('baseData:', baseData);

    const facultySubjectMap = new Map();
    for (const facultyId of facultyIds) {
      const autoSubject = getSubjectForFaculty(facultyId, baseData.courseId);
      const manualSubjectId = baseData.subjectId || '';
      const subjectId = autoSubject?.id || manualSubjectId;
      if (!subjectId) {
        const facultyName = DB.faculty.find(f => f.id === facultyId)?.name || 'Selected faculty';
        toast(`⚠️ ${facultyName} has no mapped subject. Please select a subject manually.`, 'error');
        return;
      }
      facultySubjectMap.set(facultyId, subjectId);
    }

    if (editingId) {
      // Edit mode: update single schedule (keep existing facultyId)
      const existingFacId = DB.schedules.find(s=>s.id===editingId)?.facultyId;
      const finalFacultyId = facultyIds[0] || existingFacId;
      const data = {...baseData, facultyId: finalFacultyId, subjectId: facultySubjectMap.get(finalFacultyId) || baseData.subjectId};
      const idx = DB.schedules.findIndex(s=>s.id===editingId);
      if (idx>-1) DB.schedules[idx] = {...DB.schedules[idx], ...data};
      await fsUpdate('schedules', editingId, sanitizeForDB(data));
      toast('Schedule updated! ✅','success');
    } else {
      // Add mode: create one schedule per selected faculty
      let addedCount = 0;
      for (const facultyId of facultyIds) {
        const data = {
          id: `sch_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
          ...baseData,
          facultyId,
          subjectId: facultySubjectMap.get(facultyId) || baseData.subjectId
        };
        const newId = await fsAdd('schedules', data);
        data.id = newId;
        DB.schedules.push(data);
        addedCount++;
      }
      toast(addedCount > 1 ? `${addedCount} schedules added (one per faculty)!` : 'Schedule added!', 'success');
    }
    selectedWorkTypes = [];
    selectedBatchIds = [];
    selectedMultiDates = [];
    selectedFacultyIds = [];
    closeModal();
    navigate('schedule');
  } catch(error) {
    console.error('Error saving schedule:', error);
    toast('❌ Error saving schedule: ' + error.message, 'error');
  }
}

}
async function saveTaskStatus(id){
  const t=DB.tasks.find(x=>x.id===id);
  const newStatus=document.getElementById('t-status').value;
  if(t)t.status=newStatus;
  await fsUpdate('tasks', id, {status:newStatus});
  toast('Status updated','success');closeModal();navigate('tasks');
}

function buildFacultyCardGrid(list) {
  const now = new Date().toISOString().slice(0,7);
  const isAdmin = ['admin','coordinator'].includes(currentUser?.role);
  return list.map((f,i) => {
    const grad = avatarGradients[i % avatarGradients.length];
    const scheds = DB.schedules.filter(s=>s.facultyId===f.id);
    const thisMonth = scheds.filter(s=>s.date&&s.date.startsWith(now));
    const online = scheds.filter(s=>s.mode==='online').length;
    const offline = scheds.filter(s=>s.mode==='offline').length;
    const tasks = DB.tasks.filter(t=>t.assignedFacultyIds&&t.assignedFacultyIds.includes(f.id));
    const doneTasks = tasks.filter(t=>t.status==='Completed').length;
    const pendingTasks = tasks.filter(t=>t.status!=='Completed').length;
    const util = f.maxDays>0 ? Math.min(Math.round(thisMonth.length/f.maxDays*100),100) : 0;
    const utilColor = util>=90?'var(--danger)':util>=70?'var(--warn)':'var(--accent3)';
    const modeBadge = f.workMode==='offline'?'badge-blue':f.workMode==='online'?'badge-purple':'badge-green';
    const pendingBadge = pendingTasks>0 ? `<span style="background:#fef2f2;color:#ef4444;border:1px solid #fca5a5;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700">⚠ ${pendingTasks}</span>` : '';

    return `<div onclick="openFacultyDetail('${f.id}')" style="background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;transition:all .2s;position:relative" 
      onmouseenter="this.style.borderColor='var(--accent)';this.style.boxShadow='0 8px 24px rgba(249,115,22,0.12)';this.style.transform='translateY(-2px)'"
      onmouseleave="this.style.borderColor='var(--border)';this.style.boxShadow='none';this.style.transform='none'">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:44px;height:44px;border-radius:50%;background:${grad};display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0">${f.name[0]}</div>
          <div>
            <div style="font-size:15px;font-weight:800;color:var(--text);font-family:'Nunito',sans-serif">${f.name}</div>
            <div style="font-size:12px;color:var(--text2)">${f.subject}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${pendingBadge}
          ${isAdmin ? `<button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); editFaculty('${f.id}')" style="padding:6px 10px">Edit</button>` : ''}
        </div>
      </div>
      <div style="height:4px;background:var(--surface2);border-radius:20px;margin-bottom:10px">
        <div style="height:100%;border-radius:20px;background:${utilColor};width:${util}%;transition:width .4s"></div>
      </div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:14px">${tasks.length>0?`${doneTasks}/${tasks.length} tasks done`:'No tasks'} &nbsp;·&nbsp; ${thisMonth.length}/${f.maxDays} days this month</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div style="background:var(--surface2);border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:18px;font-weight:900;color:#3b82f6;font-family:'Nunito',sans-serif">${online}</div>
          <div style="font-size:10px;color:var(--text2);font-weight:600">Online</div>
        </div>
        <div style="background:var(--surface2);border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:18px;font-weight:900;color:#f97316;font-family:'Nunito',sans-serif">${offline}</div>
          <div style="font-size:10px;color:var(--text2);font-weight:600">Offline</div>
        </div>
        <div style="background:var(--surface2);border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:18px;font-weight:900;color:${doneTasks>0&&doneTasks===tasks.length?'var(--accent3)':'var(--text2)'};font-family:'Nunito',sans-serif">${tasks.length>0?Math.round(doneTasks/tasks.length*100):0}%</div>

function filterFacultyCards() {
  const q=(document.getElementById('fac-search')?.value||'').toLowerCase();
  const sub=document.getElementById('fac-sub')?.value||'';
  const mode=document.getElementById('fac-mode')?.value||'';
  const filtered = DB.faculty.filter(f => {
    if(q && !f.name.toLowerCase().includes(q) && !f.subject.toLowerCase().includes(q)) return false;
    if(sub && f.subject!==sub) return false;
    if(mode && f.workMode!==mode) return false;
    return true;
  });
  const grid = document.getElementById('fac-card-grid');
  if(grid) grid.innerHTML = buildFacultyCardGrid(filtered);
}

}

function openAddScheduleForFaculty(facId) {
  // Pre-select this faculty then open the Add Schedule modal
  facultyDetailId = null; // don't reset detail, just open modal
  editingId = null;
  selectedWorkTypes = [];
  selectedBatchIds = [];
  selectedMultiDates = [];
  selectedFacultyIds = [facId];
  showModal('Add Schedule', buildScheduleForm(null), `
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveSchedule()">Save Schedule</button>
  `);
  document.getElementById('modal').classList.add('modal-lg');
  // After DOM ready, highlight the pre-selected faculty chip
  setTimeout(() => {
    const fac = DB.faculty.find(x=>x.id===facId);
    if (!fac) return;
    const sub = DB.subjects.find(s=>s.name===fac.subject);
    // Set subject in offline form
    const subEl = document.getElementById('f-subject');
    if (subEl && sub) { subEl.value = sub.id; }
    // Render faculty chips for offline
    const container = document.getElementById('faculty-chips-offline');
    if (container && fac) {
      const facs = DB.faculty.filter(ff=>ff.subject===fac.subject);
      container.innerHTML = renderFacultyChips(facs, 'offline', [facId]);
    }
    syncSubjectFromSelectedFaculty('offline');
    showFacultyInfo();
  }, 80);
}

//  AVAILABILITY — SLOT-BASED WEEKLY TABLE
//  Slots: NA | Full Day | FN | AN | Rec | Online Only
//  Faculty: can only edit their own, only 1 week ahead
//  Admin/Coord: can edit any faculty, any week
// ════════════════════════════════════════════════════
const AVAIL_SLOTS = ['NA','Full Day','FN','AN','Rec','Online Only'];
let _availWeekOffset = 0; // 0 = current week, 1 = next week, etc.

function _availWeekStart(offset) {
  const today = new Date();
  const day = today.getDay(); // 0=Sun
  const monday = new Date(today);
  monday.setDate(today.getDate() - day + 1 + offset * 7);
  monday.setHours(0,0,0,0);
  return monday;
}

function _availWeekDays(offset) {
  const mon = _availWeekStart(offset);
  return Array.from({length:7}, (_,i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}

function _availDateKey(d) {
  return d.toISOString().slice(0,10); // YYYY-MM-DD
}

function _availGetSlot(fid, dateKey) {
  return DB.availability[fid]?.slots?.[dateKey] || 'Full Day';
}

function _availSetSlot(fid, dateKey, slot) {
  if (!DB.availability[fid]) DB.availability[fid] = {};
  if (!DB.availability[fid].slots) DB.availability[fid].slots = {};
  DB.availability[fid].slots[dateKey] = slot;
}

  let defaultFac = '';
  if (isFaculty) {
    const myFac = DB.faculty.find(f => f.email === currentUser.email || f.name === currentUser.name);
    defaultFac = myFac?.id || '';
  } else {

    <button class="btn btn-primary" onclick="saveAvailability()">💾 Save Availability</button>
  </div>
  <div id="avail-table-wrap"></div>`;

  _availWeekOffset = 0; // Start from current week; faculty can navigate freely but can't edit past dates
  renderAvailTable();
}

function renderAvailTable() {
  const isFaculty = currentUser.role === 'faculty';
  const isAdmin = ['admin','coordinator'].includes(currentUser.role);
  const fid = document.getElementById('avail-fac')?.value;
  const fac = DB.faculty.find(f => f.id === fid) || {name: currentUser.name || '?'};

  const days = _availWeekDays(_availWeekOffset);
  const today = new Date(); today.setHours(0,0,0,0);

  // Faculty can view all weeks (past, present, future) but can only edit future weeks
  const canGoPrev = true; // can always view previous weeks
  const canGoNext = true; // always can go forward

  const weekStart = days[0];
  const weekEnd = days[6];
  const fmt = d => d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  const weekLabel = `${fmt(weekStart)} – ${fmt(weekEnd)}`;

  const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  // Build table rows: one row per day
  let rows = '';
  // Calculate lockout period: next 7 days from today (inclusive)
  const lockoutDate = new Date(today);
  lockoutDate.setDate(today.getDate() + 7);
  
  days.forEach((d, i) => {
    const dateKey = _availDateKey(d);
    const isPast = d < today;
    const isToday = _availDateKey(d) === _availDateKey(today);
    const currentSlot = _availGetSlot(fid, dateKey);

    // Faculty cannot edit for 7 days from today (locked period)
    const locked = isFaculty && d < lockoutDate;

    const dayLabel = `<div style="font-weight:700">${dayNames[i]}</div>
      <div style="font-size:11px;color:var(--text3)">${d.getDate()} ${d.toLocaleString('en',{month:'short'})}</div>
      ${locked && isFaculty ? '<span class="avail-past-note">locked</span>' : ''}
      ${isToday ? '<span style="font-size:10px;background:var(--accent);color:#fff;border-radius:20px;padding:1px 7px;margin-left:4px">Today</span>' : ''}`;

    const cells = AVAIL_SLOTS.map(slot => {
      const checked = currentSlot === slot ? 'checked' : '';
      const inp = locked
        ? `<input type="radio" disabled ${checked} style="opacity:.3" />`
        : `<input type="radio" name="avail-${dateKey}" value="${slot}" ${checked}
            onchange="availSetSlotUI('${fid}','${dateKey}',this.value)" />`;
      return `<td>${inp}</td>`;
    }).join('');

    rows += `<tr class="${locked ? 'avail-locked' : ''}">
      <td style="text-align:left;background:var(--surface2)">${dayLabel}</td>
      ${cells}
    </tr>`;
  });

  const html = `
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div class="card-title" style="margin:0">${fac.name} — Availability</div>
      ${isFaculty ? '<div style="font-size:12px;color:var(--text2)">You can view all weeks, but can only edit availability from 8 days onwards (next 7 days are locked).</div>' : ''}
    </div>
    <div class="avail-week-nav">
      <button onclick="availNavWeek(-1)" ${!canGoPrev ? 'disabled style="opacity:.4;cursor:not-allowed"' : ''}>← Prev</button>
      <div class="avail-week-label">📅 ${weekLabel}</div>
      <button onclick="availNavWeek(1)" ${!canGoNext ? 'disabled style="opacity:.4;cursor:not-allowed"' : ''}>Next →</button>
    </div>
    <div style="overflow-x:auto">
      <table class="avail-slot-table">
        <thead>
          <tr>
            <th style="text-align:left">Day</th>
            ${AVAIL_SLOTS.map(s => `<th>${s}</th>`).join('')}
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div style="margin-top:16px;display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text2)">
      <span><b>NA</b> = Not Available</span>
      <span><b>FN</b> = Forenoon</span>
      <span><b>AN</b> = Afternoon</span>
      <span><b>Rec</b> = Recording</span>
      <span><b>Full Day</b> = Fully Available</span>
      <span><b>Online Only</b> = Online only</span>
    </div>
  </div>`;

  document.getElementById('avail-table-wrap').innerHTML = html;
}

function availNavWeek(dir) {
  const newOffset = _availWeekOffset + dir;
  _availWeekOffset = newOffset;
  renderAvailTable();
}

function availSetSlotUI(fid, dateKey, slot) {
  const isFaculty = currentUser.role === 'faculty';
  const today = new Date(); today.setHours(0,0,0,0);
  const lockoutDate = new Date(today);
  lockoutDate.setDate(today.getDate() + 7);
  const selectedDate = new Date(dateKey);
  const isLocked = selectedDate < lockoutDate;
  
  // Faculty cannot edit for next 7 days
  if (isFaculty && isLocked) {
    toast('Cannot edit availability for the next 7 days', 'warning');
    return;
  }
  
  _availSetSlot(fid, dateKey, slot);
}

async function saveAvailability() {
  const isFaculty = currentUser.role === 'faculty';
  const fid = document.getElementById('avail-fac')?.value;
  if (!fid) return;
  
  let data = DB.availability[fid] || {};
  
  // Faculty: filter out dates within lockout period (next 7 days) before saving
  if (isFaculty && data.slots) {
    const today = new Date(); today.setHours(0,0,0,0);
    const lockoutDate = new Date(today);
    lockoutDate.setDate(today.getDate() + 7);
    const filteredSlots = {};
    
    Object.entries(data.slots).forEach(([dateKey, slot]) => {
      const selectedDate = new Date(dateKey);
      if (selectedDate >= lockoutDate) {
        filteredSlots[dateKey] = slot;
      }
    });
    
    data.slots = filteredSlots;
  }
  
  // Preserve only id and slots; rebuild month availability from scratch
  const preservedData = { 
    id: data.id, 
    slots: data.slots || {} 
  };
  
  // Convert slots to old format for Add Schedule modal compatibility
  // Build month-based availability structure from scratch
  if (preservedData.slots) {
    Object.entries(preservedData.slots).forEach(([dateKey, slot]) => {
      // Only mark as available if slot is NOT 'NA'
      if (slot !== 'NA') {
        const ym = dateKey.substring(0, 7); // YYYY-MM
        const day = dateKey.substring(8);   // DD
        if (!preservedData[ym]) preservedData[ym] = { available: [] };
        if (!preservedData[ym].available.includes(day)) {
          preservedData[ym].available.push(day);
        }
      }
    });
  }
  
  // Update local DB before saving to ensure modal sees updated data immediately
  DB.availability[fid] = preservedData;
  
  await fsSet('availability', fid, preservedData);
  toast('Availability saved ✅', 'success');
}

let reportSelectedMonths = new Set([new Date().toISOString().substring(0,7)]);

function toggleReportMonth(ym){
  if(reportSelectedMonths.has(ym)) reportSelectedMonths.delete(ym);
  else reportSelectedMonths.add(ym);
  const wlDiv = document.getElementById('workload-chart-inner');
  if(wlDiv) wlDiv.innerHTML = buildWorkloadBars();
  const lbl = document.getElementById('report-period-label');
  if(lbl) lbl.textContent = [...reportSelectedMonths].sort().join(', ') || 'All time';
}

function buildWorkloadBars(){
  const months = [...reportSelectedMonths];
  const facWorkload = DB.faculty.map(f=>{
    const scheds = months.length>0
      ? DB.schedules.filter(s=>s.facultyId===f.id && months.some(m=>s.date&&s.date.startsWith(m)))
      : DB.schedules.filter(s=>s.facultyId===f.id);
    const count = scheds.length;
    const util = f.maxDays>0?Math.round(count/f.maxDays*100):0;
    return {name:f.name, month:count, max:f.maxDays, util};
  }).sort((a,b)=>b.month-a.month);
  const maxMonth = Math.max(...facWorkload.map(f=>f.month),1);
  return facWorkload.map(f=>`
    <div class="chart-bar" title="${f.month} sessions — ${f.util}% utilized">
      <label style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;width:80px">${f.name.split(' ')[0]}</label>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(f.month/maxMonth*100)}%;background:${f.util>=90?'linear-gradient(90deg,#ef4444,#dc2626)':f.util>=70?'linear-gradient(90deg,#f59e0b,#d97706)':'linear-gradient(90deg,var(--accent),var(--accent2))'}; min-width:${f.month>0?'24px':'0'}">${f.month}</div></div>
      <span style="font-size:11px;color:${f.util>=90?'var(--danger)':f.util>=70?'var(--warn)':'var(--text2)'};width:36px;text-align:right;flex-shrink:0">${f.util}%</span>
    </div>`).join('');
}

function buildMonthPicker(){
  const now = new Date();
  const months = [];
  for(let i=-3;i<=4;i++){
    const d = new Date(now.getFullYear(), now.getMonth()+i, 1);
    const ym = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label = d.toLocaleString('default',{month:'short',year:'2-digit'});
    months.push({ym,label});
  }
  return months.map(m=>`<button onclick="toggleReportMonth('${m.ym}')" style="padding:5px 11px;border-radius:20px;border:1.5px solid ${reportSelectedMonths.has(m.ym)?'var(--accent)':'var(--border)'};background:${reportSelectedMonths.has(m.ym)?'#fff7ed':'var(--surface)'};color:${reportSelectedMonths.has(m.ym)?'var(--accent)':'var(--text2)'};font-size:12px;font-weight:700;cursor:pointer;transition:all .2s">${m.label}</button>`).join('');
}

function exportSchedulesCSV(){
  const rows=[['Date','Faculty','Subject','Mode','Campus','Batch(es)','Start Time','End Time','Status','Chapter / Topic','Work Type','Notes']];
  const sorted=[...DB.schedules].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  sorted.forEach(s=>{
    const f=DB.faculty.find(x=>x.id===s.facultyId)||{name:'?'};
    const sub=DB.subjects.find(x=>x.id===s.subjectId)||{name:'?'};
    const camp=DB.campuses.find(x=>x.id===s.campusId)||{name:'?'};
    const batches=(s.batchIds||[s.batchId]).filter(Boolean).map(bid=>DB.batches.find(b=>b.id===bid)?.name||'?').join(' | ');
    const wt=(s.workTypeIds||[s.workTypeId]).filter(Boolean).map(wid=>displayWorkTypeName(findWorkTypeById(wid)?.name)||'?').join(', ');
    rows.push([
      s.date||'',
      f.name,
      sub.name,
      s.mode||'',
      camp.name,
      batches,
      s.startTime||'',
      s.endTime||'',
      s.status||'',
      s.chapter||'',
      wt,
      s.notes||''
    ]);
  });
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='EduTrack_Schedules_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('Exported '+DB.schedules.length+' schedules to Excel/CSV 📊','success');
}

function calcDuration(start,end){
  const [sh,sm]=start.split(':').map(Number);
  const [eh,em]=end.split(':').map(Number);
  const mins=(eh*60+em)-(sh*60+sm);
  if(mins<=0) return '';
  const h=Math.floor(mins/60), m=mins%60;
  return h>0?(m>0?`${h}h ${m}m`:`${h}h`):`${m}m`;
}

function addPendingSlot(){
  const last=_pendingSlots[_pendingSlots.length-1];
  const nextStart=last?.endTime||'07:00';
  const [h,m]=nextStart.split(':').map(Number);
  const endMins=h*60+m+90;
  const nextEnd=`${String(Math.floor(endMins/60)).padStart(2,'0')}:${String(endMins%60).padStart(2,'0')}`;
  const n=_pendingSlots.length+1;
  _pendingSlots.push({id:'sl'+Date.now(),label:`Slot ${n}`,startTime:nextStart,endTime:nextEnd});
  renderPendingSlots();
}

function removePendingSlot(i){
  _pendingSlots.splice(i,1);
  renderPendingSlots();
}

async function saveSlotTemplate(){

  if(!name){toast('Please enter a template name','error');return;}
  if(_pendingSlots.length===0){toast('Add at least one slot','error');return;}
  const data={name, slots:[..._pendingSlots]};
  if(_editingSlotTemplateId){
    const idx=DB.slotTemplates.findIndex(t=>t.id===_editingSlotTemplateId);
    if(idx>-1) DB.slotTemplates[idx]={...DB.slotTemplates[idx],...data};
    await fsUpdate('slotTemplates',_editingSlotTemplateId,data);
    toast('Slot template updated ✅','success');
  } else {
    const newId=await fsAdd('slotTemplates',data);
    if(!newId){
      // fallback local id
      const localId='st'+Date.now();
      DB.slotTemplates.push({id:localId,...data});
    } else {
      DB.slotTemplates.push({id:newId,...data});

    toast('Slot template created ✅','success');

  closeModal();
  document.getElementById('settings-view').innerHTML=renderSlotTemplates();
}

async function deleteSlotTemplate(id){
  const inUse=DB.batches.filter(b=>b.slotTemplateId===id).length;

  if(!confirm('Delete this slot template?')) return;
  DB.slotTemplates=DB.slotTemplates.filter(t=>t.id!==id);
  await fsDelete('slotTemplates',id);
  toast('Deleted','warn');
  document.getElementById('settings-view').innerHTML=renderSlotTemplates();
}

function bseRemoveSlot(i){
  if(_bseSlots.length<=1){toast('Need at least one slot','error');return;}
  _bseSlots.splice(i,1);
  _renderBseSlots();
}

async function saveBatchSlots(){
  if(_bseSlots.length===0){toast('Add at least one slot','error');return;}
  const idx=DB.batches.findIndex(b=>b.id===_bseId);
  if(idx<0){toast('Batch not found','error');return;}
  const cleanSlots=_bseSlots.map((s,i)=>({
    id:s.id||'sl'+Date.now()+i,
    label:s.label||`Slot ${i+1}`,
    startTime:s.startTime,
    endTime:s.endTime
  }));
  DB.batches[idx]={...DB.batches[idx],slots:cleanSlots};
  await fsUpdate('batches',_bseId,{slots:cleanSlots});
  toast(`${cleanSlots.length} slots saved ✅`,'success');
  closeModal();
  navigate('batches');
}

function toast(msg, type='info'){
  const tc=document.getElementById('toast-container');
  const el=document.createElement('div');
  el.className=`toast toast-${type}`;
  const icon=type==='success'?'✅':type==='error'?'❌':'⚠️';

const avatarGradients=[
  'linear-gradient(135deg,#f97316,#ea580c)',
  'linear-gradient(135deg,#16a34a,#0891b2)',
  'linear-gradient(135deg,#8b5cf6,#db2777)',
  'linear-gradient(135deg,#3b82f6,#6366f1)',
  'linear-gradient(135deg,#d97706,#f97316)',
];
let _tooltipHideTimer=null;

function showCalTooltip(e, sid){
  clearTimeout(_tooltipHideTimer);
  const s=DB.schedules.find(x=>x.id===sid);
  if(!s) return;
  const f=DB.faculty.find(x=>x.id===s.facultyId)||{name:'?',subject:'?'};
  const sub=DB.subjects.find(x=>x.id===s.subjectId)||{name:'?'};
  const b=DB.batches.find(x=>x.id===s.batchId)||{name:'?',course:'?'};
  const wt=findWorkTypeById(s.workTypeId)||{name:'?',icon:''};
  const camp=DB.campuses.find(x=>x.id===s.campusId)||{name:'?'};
  const facIdx=DB.faculty.findIndex(x=>x.id===s.facultyId);
  const grad=avatarGradients[facIdx%avatarGradients.length];

  // populate
  const tip=document.getElementById('cal-tooltip');
  document.getElementById('ct-avatar').style.background=grad;
  document.getElementById('ct-avatar').textContent=f.name[0];
  document.getElementById('ct-name').textContent=f.name;
  document.getElementById('ct-subject').textContent=f.subject+' · '+camp.name;
  document.getElementById('ct-subjectname').textContent=sub.name;
  document.getElementById('ct-chapter').textContent=s.chapter||'—';
  document.getElementById('ct-chapter').title=s.chapter||'';
  document.getElementById('ct-batch').textContent=b.name+' ('+b.course+')';
  document.getElementById('ct-time').textContent=s.startTime+' – '+s.endTime;
  document.getElementById('ct-worktype').textContent=(wt.icon?wt.icon+' ':'')+wt.name;

  // platform row only for online
  const pr=document.getElementById('ct-platform-row');
  if(s.mode==='online' && s.platform){
    pr.style.display='flex';
    document.getElementById('ct-platform').textContent=s.platform+(s.sessionLink?' — '+s.sessionLink.substring(0,22)+'…':'');
  } else {
    pr.style.display='none';
  }

  // date + status
  const dateObj=new Date(s.date+'T00:00:00');
  document.getElementById('ct-date').textContent=dateObj.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
  const statusColors={Scheduled:'#4f8ef7',Completed:'#059669',Cancelled:'#64748b',Postponed:'#f59e0b'};
  const sc=statusColors[s.status]||'#64748b';
  document.getElementById('ct-status').innerHTML=`<span class="ct-status-dot" style="background:${sc}"></span><span style="font-size:11px;color:${sc};font-weight:600">${s.status}</span>`;

  // mode badge on name line
  const modeEl=document.getElementById('ct-subject');
  const modePill=`<span class="ct-mode-pill ct-mode-${s.mode}" style="margin-left:6px">${s.mode}</span>`;
  modeEl.innerHTML=f.subject+' · '+camp.name+modePill;

  // smart positioning — keep tooltip on screen
  const margin=12;
  const tw=260, th=220;
  let x=e.clientX+margin, y=e.clientY+margin;
  if(x+tw > window.innerWidth-margin) x=e.clientX-tw-margin;
  if(y+th > window.innerHeight-margin) y=e.clientY-th-margin;
  tip.style.left=x+'px';
  tip.style.top=y+'px';
  tip.classList.add('visible');
}

function hideCalTooltip(){
  _tooltipHideTimer=setTimeout(()=>{
    document.getElementById('cal-tooltip').classList.remove('visible');
  },120);
}

function showDaySchedules(dateStr){
  const isFaculty = currentUser.role==='faculty';
  const myFaculty = isFaculty ? getCurrentFaculty() : null;

  let schEvts = DB.schedules.filter(s=>s.date===dateStr);
  if(isFaculty && myFaculty) schEvts = schEvts.filter(s => scheduleBelongsToFaculty(s, myFaculty));
  let taskEvts = DB.tasks.filter(t=>t.dueDate===dateStr);
  if(isFaculty && myFaculty) taskEvts = taskEvts.filter(t => taskBelongsToFaculty(t, myFaculty));

  const dateObj = new Date(dateStr+'T00:00:00');
  const dateLabel = dateObj.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const total = schEvts.length + taskEvts.length;

  document.getElementById('day-schedules-title').textContent = dateLabel + ' — ' + total + ' event' + (total!==1?'s':'');

  const statusColors = {Scheduled:'#4f8ef7',Completed:'#059669',Cancelled:'#64748b',Postponed:'#f59e0b'};
  const modeStyle = {offline:'background:#fff7ed;color:#c2440c;border:1px solid #fed7aa',online:'background:#faf5ff;color:#7c3aed;border:1px solid #e9d5ff'};

  let html = '';

  schEvts.forEach(s=>{
    const f = DB.faculty.find(x=>x.id===s.facultyId)||{name:'?'};
    const sub = DB.subjects.find(x=>x.id===s.subjectId)||{name:'?'};
    const b = DB.batches.find(x=>x.id===s.batchId)||{name:'?',course:'?'};
    const facIdx = DB.faculty.findIndex(x=>x.id===s.facultyId);
    const grad = avatarGradients[facIdx%avatarGradients.length];
    const sc = statusColors[s.status]||'#64748b';
    const ms = modeStyle[s.mode]||'';
    const label = isFaculty ? sub.name : f.name;
    html+=`<div style="background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:flex-start;gap:12px"
      onmouseenter="showCalTooltip(event,'${s.id}')" onmouseleave="hideCalTooltip()">
      <div style="width:34px;height:34px;border-radius:50%;background:${grad};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0">${f.name[0]}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px">
          <span style="font-size:13px;font-weight:700;color:var(--text)">${label}</span>
          <span style="font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;${ms}">${s.mode}</span>
          <span style="font-size:10px;color:${sc};font-weight:700">● ${s.status}</span>
        </div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:2px">📚 ${sub.name}${s.chapter?' · '+s.chapter:''}</div>
        <div style="display:flex;gap:12px;font-size:12px;color:var(--text2)">
          <span>🕐 ${s.startTime} – ${s.endTime}</span>
          <span>🏫 ${b.name}</span>
        </div>
      </div>
    </div>`;
  });

  taskEvts.forEach(t=>{
    const prioColor = {High:'#ef4444',Medium:'#f59e0b',Low:'#16a34a'}[t.priority]||'#64748b';
    html+=`<div style="background:#fffbeb;border:1.5px solid #fde68a;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px">
      <div style="font-size:20px">📋</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px">${t.title}</div>
        <div style="font-size:12px;color:var(--text2);display:flex;gap:10px">
          <span style="color:${prioColor};font-weight:700">${t.priority||''} priority</span>
          <span>${t.status||''}</span>
        </div>
      </div>
    </div>`;
  });

  if(!html) html=`<div style="text-align:center;padding:30px;color:var(--text3);font-size:14px">No events on this day.</div>`;

  document.getElementById('day-schedules-body').innerHTML = html;
  document.getElementById('day-schedules-overlay').classList.add('open');
}

.studio-name{font-size:22px;font-weight:900;font-family:'Nunito',sans-serif;margin-bottom:4px}
.studio-stat{font-size:12px;color:var(--text2);margin-top:2px}
.timeline-wrap{overflow-x:auto;border-radius:14px;border:1.5px solid var(--border);background:var(--surface)}
.timeline-table{border-collapse:collapse;min-width:900px;width:100%}
.timeline-table th{background:var(--surface2);font-size:11px;font-weight:700;color:var(--text2);padding:8px 10px;border-bottom:1.5px solid var(--border);white-space:nowrap;text-align:center}
.timeline-table td{border-bottom:1px solid var(--border);padding:0;height:36px;position:relative}
.timeline-table .studio-col{font-size:12px;font-weight:800;padding:8px 14px;color:var(--text);background:var(--surface2);border-right:1.5px solid var(--border);white-space:nowrap;min-width:70px}
.tl-block{position:absolute;inset:2px 1px;border-radius:6px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:700;color:#fff;overflow:hidden;white-space:nowrap;cursor:pointer;transition:opacity .15s}
.tl-block:hover{opacity:.85}
.tl-free{background:rgba(22,163,74,.08);border:1px dashed rgba(22,163,74,.3);border-radius:6px;position:absolute;inset:3px 1px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:#16a34a;font-weight:700;transition:background .15s}
.tl-free:hover{background:rgba(22,163,74,.18)}
.req-table{width:100%;border-collapse:collapse}
.req-table th{background:var(--surface2);font-size:12px;font-weight:700;color:var(--text2);padding:11px 14px;text-align:left;border-bottom:1.5px solid var(--border)}
.req-table td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.req-table tr:hover td{background:var(--surface2)}
.status-pill{display:inline-block;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px}
.book-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.book-form-grid{grid-template-columns:1fr}}
.studio-picker{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:6px}
.studio-pick-btn{border:2px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;font-size:12px;font-weight:800;transition:all .2s;background:var(--surface)}
.studio-pick-btn.sel{color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(0,0,0,.2)}
.studio-pick-btn:hover:not(.sel){transform:translateY(-2px)}
.req-badge{display:inline-block;background:var(--accent);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;margin-left:6px}
</style>
<div class="studio-tabs" id="studio-tab-bar">
  ${isFac ? `
    <button class="studio-tab${studioView==='book'?' active':''}" onclick="studioSwitchView('book')">📅 Book Studio</button>
    <button class="studio-tab${studioView==='requests'?' active':''}" onclick="studioSwitchView('requests')">📋 My Requests</button>
  ` : `
    <button class="studio-tab${studioView==='grid'?' active':''}" onclick="studioSwitchView('grid')">🏠 Studios</button>
    <button class="studio-tab${studioView==='timeline'?' active':''}" onclick="studioSwitchView('timeline')">📊 Timeline</button>
    <button class="studio-tab${studioView==='requests'?' active':''}" onclick="studioSwitchView('requests')">
      📋 ${isMgr?'Booking Requests':'All Bookings'}
      ${isMgr ? (() => { const p=DB.studioBookings.filter(b=>b.status==='Pending').length; return p?`<span class="req-badge">${p}</span>`:''})() : ''}
    </button>
  `}
</div>
<div id="studio-view-body"></div>`;

  renderStudioView();
}

function studioSwitchView(v) {
  studioView = v;
  document.querySelectorAll('.studio-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.trim().toLowerCase().includes(
      v==='grid'?'studios':v==='timeline'?'timeline':v==='requests'?(currentUser.role==='faculty'?'my':'booking'):v==='book'?'book':v
    ));
  });
  renderStudioView();
}

function renderStudioView() {
  const body = document.getElementById('studio-view-body');
  if (!body) return;
  if (studioView === 'grid') renderStudioGrid(body);
  else if (studioView === 'timeline') renderStudioTimeline(body);
  else if (studioView === 'requests') renderStudioRequests(body);
  else if (studioView === 'book') renderStudioBookForm(body);
}

// ── GRID VIEW ──────────────────────────────────────────
function renderStudioGrid(body) {
  const today = studioSelectedDate;
  const typeColors = {HT:'#4f8ef7',RT:'#059669',IK:'#ea580c'};

  let filterBar = `
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
    <div style="display:flex;gap:6px">
      ${['All','HT','RT','IK'].map(t=>`<button onclick="studioFilterType='${t}';renderStudioView()" 
        style="padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid ${studioFilterType===t?'var(--accent)':'var(--border)'};background:${studioFilterType===t?'var(--accent)':'var(--surface)'};color:${studioFilterType===t?'#fff':'var(--text2)'};transition:all .2s">${t==='All'?'All Studios':t}</button>`).join('')}
    </div>
    <input type="date" value="${studioSelectedDate}" onchange="studioSelectedDate=this.value;renderStudioView()" style="border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;font-size:13px;font-family:inherit;background:var(--surface);color:var(--text)">
    <span style="font-size:13px;color:var(--text2);margin-left:4px">Showing availability for selected date</span>
  </div>`;

  const filtered = STUDIOS.filter(s => studioFilterType==='All' || s.type===studioFilterType);

  let cards = filtered.map(s => {
    const dayBookings = DB.studioBookings.filter(b => b.studioId===s.id && b.date===today && b.status!=='Rejected');
    const totalSlots = STUDIO_TIME_SLOTS.length - 1;
    const bookedSlots = dayBookings.reduce((acc,b)=>{
      const si = STUDIO_TIME_SLOTS.indexOf(b.startTime);
      const ei = STUDIO_TIME_SLOTS.indexOf(b.endTime);
      return acc + Math.max(0,ei-si);
    },0);
    const freeSlots = Math.max(0, totalSlots - bookedSlots);
    const pct = Math.round((bookedSlots/totalSlots)*100);
    const statusLabel = pct===0?'Fully Free':pct<50?'Available':pct<90?'Busy':'Almost Full';
    const statusCol = pct===0?'#16a34a':pct<50?'#16a34a':pct<90?'#f59e0b':'#ef4444';
    const pending = DB.studioBookings.filter(b=>b.studioId===s.id&&b.date===today&&b.status==='Pending').length;

    return `<div class="studio-card" style="border-color:${s.color}22;border-top:4px solid ${s.color}" onclick="studioView='timeline';studioFilterType='${s.type}';renderStudioView()">
      <div class="studio-type-tag" style="background:${s.color}22;color:${s.color}">${s.type}</div>
      ${pending?`<span class="studio-card-badge" style="background:#f59e0b;color:#fff">⏳ ${pending} pending</span>`:''}
      <div class="studio-name" style="color:${s.color}">${s.id}</div>
      <div style="margin:10px 0 8px">
        <div style="background:var(--surface2);border-radius:99px;height:6px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:${statusCol};border-radius:99px;transition:width .4s"></div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:${statusCol};font-weight:700">● ${statusLabel}</span>
        <span style="font-size:12px;color:var(--text2)">${freeSlots}/${totalSlots} slots free</span>
      </div>
      <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
        ${dayBookings.slice(0,3).map(b=>{
          const f=DB.faculty.find(x=>x.id===b.facultyId)||{name:'?'};
          return `<span style="font-size:10px;background:${s.color}15;color:${s.color};padding:2px 7px;border-radius:6px;font-weight:700">${b.startTime}–${b.endTime} ${f.name.split(' ')[0]}</span>`;
        }).join('')}
        ${dayBookings.length>3?`<span style="font-size:10px;color:var(--text2)">+${dayBookings.length-3} more</span>`:''}
      </div>
    </div>`;
  }).join('');

  body.innerHTML = filterBar + `<div class="studio-grid">${cards||'<div style="color:var(--text3);padding:20px;grid-column:1/-1">No studios found.</div>'}</div>`;
}

// ── TIMELINE VIEW ────────────────────────────────────────
function renderStudioTimeline(body) {
  const filtered = STUDIOS.filter(s => studioFilterType==='All' || s.type===studioFilterType);
  const slots = STUDIO_TIME_SLOTS;

  let filterBar = `
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
    ${['All','HT','RT','IK'].map(t=>`<button onclick="studioFilterType='${t}';renderStudioView()" 
      style="padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid ${studioFilterType===t?'var(--accent)':'var(--border)'};background:${studioFilterType===t?'var(--accent)':'var(--surface)'};color:${studioFilterType===t?'#fff':'var(--text2)'};transition:all .2s">${t==='All'?'All Studios':t}</button>`).join('')}
    <input type="date" value="${studioSelectedDate}" onchange="studioSelectedDate=this.value;renderStudioView()" style="border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;font-size:13px;font-family:inherit;background:var(--surface);color:var(--text)">
    <span style="font-size:12px;color:var(--text2)">
      <span style="display:inline-block;width:10px;height:10px;background:#16a34a;border-radius:3px;margin-right:4px"></span>Free
      <span style="display:inline-block;width:10px;height:10px;background:#f59e0b;border-radius:3px;margin:0 4px 0 10px"></span>Pending
      <span style="display:inline-block;width:10px;height:10px;background:#4f8ef7;border-radius:3px;margin:0 4px 0 10px"></span>Approved
    </span>
  </div>`;

  const colWidth = 52;
  let headerCells = `<th class="studio-col">Studio</th>` + slots.slice(0,-1).map((_,i)=>`<th style="min-width:${colWidth}px">${slots[i]}</th>`).join('');

  let rows = filtered.map(s => {
    const dayBookings = DB.studioBookings.filter(b => b.studioId===s.id && b.date===studioSelectedDate && b.status!=='Rejected');

    let cells = slots.slice(0,-1).map((_,i) => {
      const slotStart = slots[i];
      const slotEnd = slots[i+1];
      const booking = dayBookings.find(b => b.startTime <= slotStart && b.endTime > slotStart);
      if (booking) {
        // Only render block at its start slot
        if (booking.startTime === slotStart) {
          const startIdx = slots.indexOf(booking.startTime);
          const endIdx   = slots.indexOf(booking.endTime);
          const span = Math.max(1, endIdx - startIdx);
          const f = DB.faculty.find(x=>x.id===booking.facultyId)||{name:'?'};
          const bc = booking.status==='Pending'?'#f59e0b':booking.status==='Approved'?s.color:'#6366f1';
          const role = currentUser.role;
          const canEdit = role==='studio'||['admin','coordinator'].includes(role);
          return `<td colspan="${span}" style="position:relative">
            <div class="tl-block" style="background:${bc}" onclick="${canEdit?`studioEditBooking('${booking.id}')`:''}" title="${f.name} | ${booking.startTime}–${booking.endTime} | ${booking.status}">
              ${f.name.split(' ')[0]} ${booking.startTime}–${booking.endTime}
              ${booking.status==='Pending'?'⏳':''}
            </div>
          </td>`;
        } else return null; // skip — covered by colspan
      }
      const isMgrOrAdmin = ['studio','admin','coordinator'].includes(currentUser.role);
      return `<td><div class="tl-free" onclick="${isMgrOrAdmin?`studioQuickBook('${s.id}','${slotStart}','${slotEnd}')`:''}" title="Free: ${slotStart}">${isMgrOrAdmin?'+':''}</div></td>`;
    }).filter(c=>c!==null).join('');

    return `<tr><td class="studio-col"><span style="color:${s.color};font-weight:900">${s.id}</span></td>${cells}</tr>`;
  }).join('');

  body.innerHTML = filterBar + `
  <div class="timeline-wrap">
    <table class="timeline-table">
      <thead><tr>${headerCells}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  <div style="margin-top:10px;font-size:12px;color:var(--text3)">💡 Click a green slot to quick-book • Click a booking block to edit/approve</div>`;
}

// ── REQUESTS / ALL BOOKINGS ──────────────────────────────
function renderStudioRequests(body) {
  const role = currentUser.role;
  const isMgr = role === 'studio';
  const isFac = role === 'faculty';
  const isAdm = ['admin','coordinator'].includes(role);

  let bookings = [...DB.studioBookings].sort((a,b) => a.date < b.date ? 1 : -1);
  if (isFac) bookings = bookings.filter(b => b.facultyId === currentUser.id);

  // Filter bar
  let filterStatus = window._studioReqFilter || 'All';
  const statusCounts = {};
  DB.studioBookings.forEach(b => { statusCounts[b.status] = (statusCounts[b.status]||0)+1; });

  let filterBar = `
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap">
    ${['All','Pending','Approved','Rejected','Edited'].map(s=>{
      const cnt = s==='All'?DB.studioBookings.length:(statusCounts[s]||0);
      return `<button onclick="window._studioReqFilter='${s}';renderStudioView()" 
        style="padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid ${filterStatus===s?'var(--accent)':'var(--border)'};background:${filterStatus===s?'var(--accent)':'var(--surface)'};color:${filterStatus===s?'#fff':'var(--text2)'}">${s} <span style="opacity:.7">(${cnt})</span></button>`;
    }).join('')}
  </div>`;

  if (filterStatus !== 'All') bookings = bookings.filter(b=>b.status===filterStatus);

  const rows = bookings.map(b => {
    const f = DB.faculty.find(x=>x.id===b.facultyId)||{name:'?'};
    const s = STUDIOS.find(x=>x.id===b.studioId)||{color:'#64748b'};
    const sc = STUDIO_STATUS_COLOR[b.status]||'#64748b';
    const canApprove = isMgr || isAdm;
    const actions = canApprove ? `
      ${b.status==='Pending'?`<button onclick="studioApproveBooking('${b.id}')" class="btn btn-sm" style="background:#dcfce7;color:#16a34a;border:none;font-weight:700;padding:5px 10px;border-radius:7px;cursor:pointer">✓ Approve</button>
      <button onclick="studioEditBooking('${b.id}')" class="btn btn-sm" style="background:#ede9fe;color:#7c3aed;border:none;font-weight:700;padding:5px 10px;border-radius:7px;cursor:pointer">✏️ Edit</button>
      <button onclick="studioRejectBooking('${b.id}')" class="btn btn-sm" style="background:#fee2e2;color:#dc2626;border:none;font-weight:700;padding:5px 10px;border-radius:7px;cursor:pointer">✕ Reject</button>`
      : `<button onclick="studioEditBooking('${b.id}')" class="btn btn-sm" style="background:#ede9fe;color:#7c3aed;border:none;font-weight:700;padding:5px 10px;border-radius:7px;cursor:pointer">✏️ Edit</button>
      <button onclick="studioRejectBooking('${b.id}')" class="btn btn-sm" style="background:#fee2e2;color:#dc2626;border:none;font-weight:700;padding:5px 10px;border-radius:7px;cursor:pointer">✕ Delete</button>`}
    ` : (isFac && b.status==='Pending' ? `<button onclick="studioCancelBooking('${b.id}')" class="btn btn-sm" style="background:#fee2e2;color:#dc2626;border:none;font-weight:700;padding:5px 10px;border-radius:7px;cursor:pointer">Cancel</button>` : '');

    return `<tr>
      <td><span style="font-size:11px;font-weight:700;color:#fff;background:${s.color};padding:3px 9px;border-radius:6px">${b.studioId}</span></td>
      <td><b>${b.date}</b></td>
      <td>${b.startTime} – ${b.endTime}</td>
      <td>${f.name}</td>
      <td>${b.purpose||'—'}</td>
      <td><span class="status-pill" style="background:${sc}22;color:${sc}">${b.status}</span></td>
      ${b.managerNote?`<td style="font-size:12px;color:var(--text2);font-style:italic">${b.managerNote}</td>`:`<td style="color:var(--text3)">—</td>`}
      <td style="white-space:nowrap">${actions}</td>
    </tr>`;
  }).join('');

  body.innerHTML = filterBar + `
  <div style="overflow-x:auto;border-radius:14px;border:1.5px solid var(--border)">
  <table class="req-table">
    <thead><tr>
      <th>Studio</th><th>Date</th><th>Time</th><th>Faculty</th><th>Purpose</th><th>Status</th><th>Note</th><th>Actions</th>
    </tr></thead>
    <tbody>${rows||`<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--text3)">No bookings found.</td></tr>`}</tbody>
  </table>
  </div>`;
}

// ── FACULTY BOOK FORM ────────────────────────────────────
function renderStudioBookForm(body) {
  const myBookings = DB.studioBookings.filter(b=>b.facultyId===currentUser.id).sort((a,b)=>a.date<b.date?1:-1).slice(0,5);
  const today = new Date().toISOString().split('T')[0];

  const recentHtml = myBookings.length ? `
  <div style="margin-top:28px">
    <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px">📋 My Recent Requests</div>
    ${myBookings.map(b=>{
      const s=STUDIOS.find(x=>x.id===b.studioId)||{color:'#64748b'};
      const sc=STUDIO_STATUS_COLOR[b.status]||'#64748b';
      return `<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;margin-bottom:8px">
        <span style="font-size:11px;font-weight:800;color:#fff;background:${s.color};padding:4px 10px;border-radius:7px">${b.studioId}</span>
        <div style="flex:1">
          <b>${b.date}</b> &nbsp; ${b.startTime} – ${b.endTime}
          ${b.purpose?`<span style="font-size:12px;color:var(--text2);margin-left:8px">${b.purpose}</span>`:''}
        </div>
        <span style="font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;background:${sc}22;color:${sc}">${b.status}</span>
        ${b.managerNote?`<span style="font-size:11px;color:var(--text2);font-style:italic;max-width:140px;overflow:hidden;text-overflow:ellipsis">"${b.managerNote}"</span>`:''}
      </div>`;
    }).join('')}
  </div>` : '';

  body.innerHTML = `
  <div style="max-width:680px">
    <div style="background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:24px">
      <div style="font-size:16px;font-weight:800;color:var(--text);margin-bottom:18px">📅 Request Studio Booking</div>
      <div class="book-form-grid">
        <div class="form-group">
          <label>Date <span style="color:#ef4444">*</span></label>
          <input type="date" id="bk-date" min="${today}" style="width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-family:inherit;font-size:14px;color:var(--text)" onchange="studioUpdateScheduleHint()">
          <div id="sched-hint" style="font-size:11px;color:var(--text2);margin-top:4px"></div>
        </div>
        <div class="form-group">
          <label>Studio <span style="color:#ef4444">*</span></label>
          <div class="studio-picker" id="studio-picker">
            ${STUDIOS.map(s=>`<div class="studio-pick-btn" id="spick-${s.id}" onclick="studioPickStudio('${s.id}')" style="color:${s.color}">
              <div style="font-size:13px">${s.id}</div>
              <div style="font-size:9px;opacity:.6">${s.type}</div>
            </div>`).join('')}
          </div>
          <input type="hidden" id="bk-studio" />
        </div>
        <div class="form-group">
          <label>Start Time <span style="color:#ef4444">*</span></label>
          <select id="bk-start" style="width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-family:inherit;font-size:14px;color:var(--text)">
            ${STUDIO_TIME_SLOTS.slice(0,-1).map(t=>`<option>${t}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>End Time <span style="color:#ef4444">*</span></label>
          <select id="bk-end" style="width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-family:inherit;font-size:14px;color:var(--text)">
            ${STUDIO_TIME_SLOTS.slice(1).map(t=>`<option>${t}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Purpose / Notes</label>
        <textarea id="bk-purpose" rows="3" style="width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-family:inherit;font-size:14px;color:var(--text);resize:vertical" placeholder="e.g. Recording lecture for BCA Sem 3, practice session…"></textarea>
      </div>
      <div id="conflict-warning" style="display:none;background:#fef3c7;border:1.5px solid #f59e0b;border-radius:10px;padding:12px 14px;font-size:13px;color:#92400e;margin-bottom:14px">
        ⚠️ <b>Conflict:</b> This studio already has a booking in the selected time slot.
      </div>
      <button class="btn btn-primary" onclick="studioSubmitBooking()" style="width:100%;justify-content:center">Send Booking Request →</button>
    </div>
    ${recentHtml}
  </div>`;
}

let _selectedStudioId = null;
function studioPickStudio(id) {
  _selectedStudioId = id;
  document.getElementById('bk-studio').value = id;
  document.querySelectorAll('.studio-pick-btn').forEach(el => {
    const sid = el.id.replace('spick-','');
    const s = STUDIOS.find(x=>x.id===sid);
    el.classList.toggle('sel', sid===id);
    if (sid===id) el.style.background=s.color;
    else { el.style.background='var(--surface)'; el.style.color=s.color; }
  });
  studioCheckConflict();
}

function studioUpdateScheduleHint() {
  const date = document.getElementById('bk-date')?.value;
  if (!date) return;
  const scheds = DB.schedules.filter(s=>s.facultyId===currentUser.id&&s.date===date&&s.status!=='Cancelled');
  const hint = document.getElementById('sched-hint');
  if (hint) hint.textContent = scheds.length
    ? `📚 You have ${scheds.length} class(es) on this day: ${scheds.map(s=>s.startTime+'–'+s.endTime).join(', ')}`
    : 'No classes scheduled on this day.';
  studioCheckConflict();
}

function studioCheckConflict() {
  const date = document.getElementById('bk-date')?.value;
  const studio = document.getElementById('bk-studio')?.value;
  const start = document.getElementById('bk-start')?.value;
  const end = document.getElementById('bk-end')?.value;
  const warn = document.getElementById('conflict-warning');
  if (!warn) return;
  if (!date||!studio||!start||!end) { warn.style.display='none'; return; }
  const clash = DB.studioBookings.find(b=>
    b.studioId===studio && b.date===date && b.status!=='Rejected' &&
    !(end<=b.startTime || start>=b.endTime)
  );
  warn.style.display = clash ? 'block' : 'none';
}

async function studioSubmitBooking() {
  const date    = document.getElementById('bk-date')?.value;
  const studioId= document.getElementById('bk-studio')?.value;
  const start   = document.getElementById('bk-start')?.value;
  const end     = document.getElementById('bk-end')?.value;
  const purpose = document.getElementById('bk-purpose')?.value?.trim();

  if (!date||!studioId||!start||!end) { toast('Please fill all required fields','error'); return; }
  if (start >= end) { toast('End time must be after start time','error'); return; }

  const booking = {
    facultyId: currentUser.id,
    studioId, date, startTime: start, endTime: end,
    purpose: purpose||'',
    status: 'Pending',
    managerNote: '',
    createdAt: new Date().toISOString(),
  };
  const id = await fsAdd('studioBookings', booking);
  if (id) {
    DB.studioBookings.push({id,...booking});
    toast('Booking request sent! ✅ Awaiting studio manager approval.','success');
    studioView = 'requests';
    window._studioReqFilter = 'All';
    renderStudio(document.getElementById('main-content'));
  }
}

async function studioApproveBooking(id) {
  const b = DB.studioBookings.find(x=>x.id===id);
  if (!b) return;
  // Check for conflicts with other approved bookings
  const clash = DB.studioBookings.find(x=>
    x.id!==id && x.studioId===b.studioId && x.date===b.date &&
    x.status==='Approved' && !(b.endTime<=x.startTime||b.startTime>=x.endTime)
  );
  if (clash) { toast('⚠️ Conflict with another approved booking! Edit first.','error'); return; }
  await fsUpdate('studioBookings', id, {status:'Approved'});
  b.status = 'Approved';
  toast('Booking approved ✅','success');
  renderStudioView();
}

// Faculty Schedule Timetable View (7 days, dates in rows, times in columns)
function renderFacultyScheduleTimetable(faculty) {
  const today = new Date();
  const startOfWeek = new Date(today);
  const dow = today.getDay();
  const diffToMon = (dow === 0) ? -6 : 1 - dow;
  startOfWeek.setDate(today.getDate() + diffToMon);

  const weekOffset = window._fscWeekOffset || 0;
  const baseStart = new Date(startOfWeek);
  baseStart.setDate(baseStart.getDate() + weekOffset * 7);
  
  const viewDays = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(baseStart);
    d.setDate(baseStart.getDate() + i);
    viewDays.push(d);
  }

  // Get faculty schedules for this week
  let schedules = DB.schedules.filter(s => scheduleBelongsToFaculty(s, faculty));
  
  const viewDatesSet = new Set(viewDays.map(d => d.toISOString().slice(0,10)));
  schedules = schedules.filter(s => viewDatesSet.has(s.date));

  // Summary stats
  const totalSched = schedules.length;
  const completedSched = schedules.filter(s=>s.status==='Completed').length;
  const pendingSched = schedules.filter(s=>s.status==='Scheduled'||s.status==='Pending').length;
  const cancelledSched = schedules.filter(s=>s.status==='Cancelled').length;

  // Time slots: 7:00 AM to 10:00 PM
  const timeSlots = [];
  for (let h = 7; h <= 21; h++) {
    for (let m = 0; m < 60; m += 30) {
      timeSlots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    }
  }

  // Build timetable HTML
  let timetableHtml = `
    <div style="overflow-x:auto;border:1.5px solid var(--border);border-radius:12px;background:var(--surface)">
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead style="position:sticky;top:0;background:var(--surface2);z-index:10">
        <tr>
          <th style="padding:10px;min-width:110px;text-align:center;border-right:1.5px solid var(--border);font-weight:700">Date</th>
          ${timeSlots.map(time => `<th style="padding:8px;min-width:80px;border-right:1px solid var(--border);text-align:center;font-weight:700;background:var(--surface2)"><div style="font-size:12px;font-weight:700">${time}</div></th>`).join('')}
        </tr>
      </thead>
      <tbody>
  `;

  viewDays.forEach(date => {
    const dateStr = date.toISOString().slice(0,10);
    const dayName = date.toLocaleDateString('default', {weekday: 'short'});
    const dayNum = date.getDate();
    const isToday = dateStr === new Date().toISOString().slice(0,10);
    const daySchedules = schedules.filter(s => s.date === dateStr);

    timetableHtml += `
      <tr>
        <td style="padding:8px;min-width:110px;border-right:1.5px solid var(--border);border-bottom:1px solid var(--border);font-weight:700;background:${isToday?'#fff7ed':'var(--surface2)'};text-align:center;position:sticky;left:0;z-index:5;${isToday?'border-right-color:var(--accent);':''}">
          <div style="font-size:11px;color:var(--text2)">${dayName}</div>
          <div style="font-size:16px;color:${isToday?'var(--accent)':'var(--text)'};">${dayNum}</div>
        </td>
    `;

    timeSlots.forEach(timeSlot => {
      const matchingScheds = daySchedules.filter(s => {
        const startTime = s.startTime || '07:00';
        const endTime = s.endTime || '18:00';
        return startTime <= timeSlot && timeSlot < endTime;
      });

      let cellContent = '';
      if (matchingScheds.length > 0) {
        const sched = matchingScheds[0];
        const subject = DB.subjects.find(s => s.id === sched.subjectId);
        const batch = DB.batches.find(b => b.id === sched.batchId);
        const modeBg = sched.mode === 'online' ? '#faf5ff' : '#fff7ed';
        const modeColor = sched.mode === 'online' ? '#7c3aed' : '#c2440c';
        const modeIcon = sched.mode === 'online' ? '💻' : '📍';
        
        cellContent = `<div style="background:${modeBg};border:2px solid ${modeColor};border-radius:6px;padding:6px;cursor:pointer;font-weight:600;color:${modeColor};text-align:center;min-height:50px;display:flex;flex-direction:column;justify-content:center;align-items:center;font-size:11px" title="Click to edit" onclick="editSchedule('${sched.id}')" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'"><div>${modeIcon} ${subject?.name || '—'}</div><div style="margin-top:2px">${batch?.name || '—'}</div></div>`;
      } else {
        cellContent = `<div style="cursor:pointer;padding:4px;opacity:0.5;font-size:18px" onclick="fscQuickAdd('${dateStr}')" title="Add schedule">+</div>`;
      }

      timetableHtml += `<td style="padding:3px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);text-align:center;vertical-align:middle;background:${isToday?'#fff7ed08':'var(--surface)'};">${cellContent}</td>`;
    });

    timetableHtml += `</tr>`;
  });

  timetableHtml += `
      </tbody>
    </table>
    </div>
  `;

  return `
  <style>
  .fsc-toolbar{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:18px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px}
  .fsc-nav-btn{padding:7px 14px;border-radius:8px;background:var(--surface2);border:1.5px solid var(--border);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
  .fsc-nav-btn:hover{background:var(--surface);border-color:var(--accent);color:var(--accent)}
  .fsc-summary{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .fsc-stat{flex:1;min-width:100px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center}
  .fsc-stat-val{font-size:22px;font-weight:900;font-family:'Nunito',sans-serif}
  .fsc-stat-lbl{font-size:11px;color:var(--text2);font-weight:600;margin-top:2px}
  </style>
  <div class="fsc-toolbar">
    <div style="margin-left:auto;display:flex;gap:6px">
      <button class="fsc-nav-btn" onclick="fscWeekNav(-1)">◀ Prev</button>
      <button class="fsc-nav-btn" onclick="fscGoToday()">Today</button>
      <button class="fsc-nav-btn" onclick="fscWeekNav(1)">Next ▶</button>
    </div>
  </div>

  <div class="fsc-summary">
    <div class="fsc-stat"><div class="fsc-stat-val">${totalSched}</div><div class="fsc-stat-lbl">Total Sessions</div></div>
    <div class="fsc-stat"><div class="fsc-stat-val" style="color:var(--accent3)">${completedSched}</div><div class="fsc-stat-lbl">Completed</div></div>
    <div class="fsc-stat"><div class="fsc-stat-val" style="color:#3b82f6">${pendingSched}</div><div class="fsc-stat-lbl">Scheduled</div></div>
    <div class="fsc-stat"><div class="fsc-stat-val" style="color:var(--danger)">${cancelledSched}</div><div class="fsc-stat-lbl">Cancelled</div></div>
  </div>

  ${timetableHtml}

  <div style="font-size:12px;color:var(--text3);padding:12px 2px">💡 Click a session to edit · Click <strong>+</strong> to add a schedule · Highlighted cell = today</div>
  `;
}

function renderBatchView() {
  // ── NEW LAYOUT: rows = batches, columns = slots, filter by a single selected date ──

  const todayStr = new Date().toISOString().slice(0,10);
  const selectedDate = window._bvDate || todayStr;
  const selectedCampusId = window._bvCampusId || '';
  const subjectFilter = window._bvSubject || '';
  // _bvSelectedBatches: Set of selected batch IDs (empty = all)
  if (!window._bvSelectedBatches) window._bvSelectedBatches = new Set();
  const selectedBatchIds = window._bvSelectedBatches;

  // Batch pool filtered by campus
  const campusBatchPool = selectedCampusId
    ? DB.batches.filter(b => b.campusId === selectedCampusId)
    : DB.batches;

  // Final batch pool: further filtered by selected batches (if any selected)
  const batchPool = selectedBatchIds.size > 0
    ? campusBatchPool.filter(b => selectedBatchIds.has(b.id))
    : campusBatchPool;

  const campusOpts = DB.campuses.map(c =>
    `<option value="${c.id}" ${c.id===selectedCampusId?'selected':''}>${c.name}</option>`
  ).join('');
  const subjOpts = DB.subjects.map(s =>
    `<option value="${s.id}" ${s.id===subjectFilter?'selected':''}>${s.name}</option>`
  ).join('');

  // Build multi-select batch dropdown items
  const batchSelectedCount = selectedBatchIds.size;
  const batchBtnLabel = batchSelectedCount === 0
    ? 'All Batches'
    : batchSelectedCount === 1
      ? (campusBatchPool.find(b=>selectedBatchIds.has(b.id))?.name || 'All Batches')
      : `${batchSelectedCount} Batches selected`;

  // All schedules for selected date
  let daySchedules = DB.schedules.filter(s => s.date === selectedDate);
  if (subjectFilter) daySchedules = daySchedules.filter(s => s.subjectId === subjectFilter);

  const totalSched = daySchedules.length;
  const completedSched = daySchedules.filter(s=>s.status==='Completed').length;
  const pendingSched = daySchedules.filter(s=>s.status==='Scheduled'||s.status==='Pending').length;
  const cancelledSched = daySchedules.filter(s=>s.status==='Cancelled').length;

  // ── Collect ALL unique slots across all batches in the pool ──
  // We'll use each batch's own slot template; if none, fallback columns per batch row
  // First gather all unique slot start/end combos to form the column headers
  const allSlotSets = batchPool.map(b => getSlotsForBatch(b.id) || []);
  const globalSlots = [];
  const seenSlotKeys = new Set();
  allSlotSets.forEach(slots => {
    slots.forEach(sl => {
      const key = `${sl.startTime}-${sl.endTime}`;
      if (!seenSlotKeys.has(key)) {
        seenSlotKeys.add(key);
        globalSlots.push(sl);
      }
    });
  });
  // Sort slots by start time
  globalSlots.sort((a,b) => a.startTime.localeCompare(b.startTime));

  const hasAnySlots = globalSlots.length > 0;

  // Format selected date nicely
  const selDateObj = new Date(selectedDate + 'T00:00:00');
  const isToday = selectedDate === todayStr;
  const dateFmt = selDateObj.toLocaleDateString('default', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

  // ── Navigate by day ──
  const prevDay = new Date(selDateObj); prevDay.setDate(prevDay.getDate()-1);
  const nextDay = new Date(selDateObj); nextDay.setDate(nextDay.getDate()+1);
  const prevStr = prevDay.toISOString().slice(0,10);
  const nextStr = nextDay.toISOString().slice(0,10);

  let timetableHtml = '';

  if (hasAnySlots) {
    // ══ SLOT-BASED GRID: rows = batches, columns = slots ══
    timetableHtml = `
    <div style="overflow-x:auto;border:1.5px solid var(--border);border-radius:12px;background:var(--surface)">
    <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:600px">
      <thead style="position:sticky;top:0;background:var(--surface2);z-index:10">
        <tr>
          <th style="padding:10px 14px;min-width:150px;text-align:left;border-right:1.5px solid var(--border);font-weight:700;color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.07em">Batch</th>
          ${globalSlots.map(sl => `
            <th style="padding:8px 10px;min-width:140px;border-right:1px solid var(--border);text-align:center;background:var(--surface2)">
              <div style="font-size:13px;font-weight:800;color:var(--accent)">${sl.label}</div>
              <div style="font-size:11px;color:var(--text3);font-weight:600;margin-top:2px;font-family:monospace">${sl.startTime} – ${sl.endTime}</div>
              <div style="font-size:10px;color:var(--text3);margin-top:1px">${calcDuration(sl.startTime,sl.endTime)}</div>
            </th>`).join('')}
        </tr>
      </thead>
      <tbody>`;

    batchPool.forEach(batch => {
      const batchSchedules = daySchedules.filter(s => {
        const bids = (s.batchIds||[s.batchId]).filter(Boolean);
        return bids.includes(batch.id);
      });
      const batchSlots = getSlotsForBatch(batch.id) || [];
      const campus = DB.campuses.find(c=>c.id===batch.campusId);

      timetableHtml += `
        <tr>
          <td style="padding:8px 12px;min-width:150px;border-right:1.5px solid var(--border);border-bottom:1px solid var(--border);background:var(--surface2);position:sticky;left:0;z-index:5;">
            <div style="font-weight:800;font-size:13px;color:var(--text)">${batch.name}</div>
            <div style="font-size:11px;color:var(--text2);margin-top:2px">${batch.course||''}</div>
            <div style="font-size:10px;color:var(--text3);margin-top:1px">${campus?.name||''}</div>
            ${batchSlots.length===0?`<div style="margin-top:4px"><span style="font-size:10px;color:#d97706;background:#fffbeb;border:1px solid #fde68a;border-radius:4px;padding:1px 5px;cursor:pointer" onclick="openBatchSlotEditor('${batch.id}')">+ Add Slots</span></div>`:''}
          </td>`;

      const skipSlots = new Set();
      globalSlots.forEach((sl, slIdx) => {
        if (skipSlots.has(slIdx)) return;

        // Check if this batch even has this slot configured
        const batchHasSlot = batchSlots.some(bs => bs.startTime === sl.startTime && bs.endTime === sl.endTime);

        if (!batchHasSlot && batchSlots.length > 0) {
          // Batch has slots but not this one — show N/A cell
          timetableHtml += `<td style="padding:4px 5px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);text-align:center;background:#fafbfc;">
            <div style="color:var(--border);font-size:18px;line-height:3">—</div>
          </td>`;
          return;
        }

        // Find schedule matching this slot for this batch
        const matchingSched = batchSchedules.find(s => {
          const st = s.startTime || '00:00';
          return st >= sl.startTime && st < sl.endTime;
        });

        if (matchingSched) {
          const schedEnd = matchingSched.endTime || sl.endTime;
          let colspan = 1;
          for (let j = slIdx + 1; j < globalSlots.length; j++) {
            if (schedEnd > globalSlots[j].startTime) {
              colspan++;
              skipSlots.add(j);
            } else break;
          }
          const faculty = DB.faculty.find(f => f.id === matchingSched.facultyId);
          const subject = DB.subjects.find(s => s.id === matchingSched.subjectId);
          const modeBg = matchingSched.mode === 'online' ? '#faf5ff' : '#fff7ed';
          const modeColor = matchingSched.mode === 'online' ? '#7c3aed' : '#c2440c';
          const modeBorder = matchingSched.mode === 'online' ? '#d8b4fe' : '#fdba74';
          const modeIcon = matchingSched.mode === 'online' ? '💻' : '📍';
          const statusDot = matchingSched.status==='Completed'?'#16a34a':matchingSched.status==='Cancelled'?'#94a3b8':matchingSched.status==='Postponed'?'#f59e0b':'#3b82f6';
          const statusLabel = matchingSched.status||'Scheduled';

          timetableHtml += `<td colspan="${colspan}" style="padding:4px 5px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);vertical-align:top;background:var(--surface);">

              onclick="editSchedule('${matchingSched.id}')"
              onmouseover="this.style.boxShadow='0 3px 12px rgba(0,0,0,0.13)'"
              onmouseout="this.style.boxShadow='none'">
              <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
                <span>${modeIcon}</span>
                <span style="width:7px;height:7px;border-radius:50%;background:${statusDot};flex-shrink:0"></span>
                <span style="color:var(--text3);font-weight:600;font-size:10px">${statusLabel}</span>
                ${colspan>1?`<span style="margin-left:auto;font-size:10px;color:${modeColor};font-weight:700;background:${modeBg};border:1px solid ${modeBorder};border-radius:20px;padding:1px 7px">${colspan} slots</span>`:''}
              </div>
              <div style="font-weight:800;font-size:13px;color:${modeColor}">${subject?.name||'—'}</div>
              <div style="font-size:11px;color:var(--text2);font-weight:600">${faculty?.code||faculty?.name||'—'}</div>
              <div style="font-size:10px;color:var(--text3);font-family:monospace;margin-top:1px">🕐 ${matchingSched.startTime||sl.startTime} – ${matchingSched.endTime||sl.endTime}</div>
            </div>
          </td>`;

            <div onclick="bvSlotQuickAdd('${selectedDate}','${batch.id}','${sl.startTime}','${sl.endTime}')"
              style="cursor:pointer;border:1.5px dashed var(--border);border-radius:8px;min-height:68px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all .15s;color:var(--text3)"

              <span style="font-size:10px;font-weight:600;opacity:.7">${sl.startTime}</span>
            </div>
          </td>`;
        }
      });

      timetableHtml += `</tr>`;
    });

    timetableHtml += `</tbody></table></div>`;

  } else {
    // ══ FALLBACK: no slots configured — show 30-min time grid, batches as rows ══
    const timeSlots = [];
    for (let h = 7; h <= 21; h++) {
      for (let m = 0; m < 60; m += 30) {
        timeSlots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);

        }
        timetableHtml += `<td style="padding:3px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);text-align:center;vertical-align:middle;">${cell}</td>`;
      });

function bvToggleBatchDropdown(e) {
  e.stopPropagation();
  const btn = document.getElementById('bv-ms-btn');
  const dd = document.getElementById('bv-ms-dropdown');
  const isOpen = dd.classList.contains('open');
  if (isOpen) {
    dd.classList.remove('open');
    btn.classList.remove('open');
  } else {
    dd.classList.add('open');
    btn.classList.add('open');
    setTimeout(() => document.getElementById('bv-dd-search-input')?.focus(), 60);
  }
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
  const wrap = document.getElementById('bv-ms-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('bv-ms-dropdown')?.classList.remove('open');
    document.getElementById('bv-ms-btn')?.classList.remove('open');
  }
});

function bvToggleBatch(batchId, el) {
  if (!window._bvSelectedBatches) window._bvSelectedBatches = new Set();
  if (window._bvSelectedBatches.has(batchId)) {
    window._bvSelectedBatches.delete(batchId);
    el.classList.remove('checked');
  } else {
    window._bvSelectedBatches.add(batchId);
    el.classList.add('checked');
  }
  // Update button label without full re-render (keep dropdown open)
  const count = window._bvSelectedBatches.size;
  const campusBatchPool = window._bvCampusId
    ? DB.batches.filter(b => b.campusId === window._bvCampusId)
    : DB.batches;
  let label;
  if (count === 0) label = 'All Batches';
  else if (count === 1) label = campusBatchPool.find(b=>window._bvSelectedBatches.has(b.id))?.name || '1 Batch';
  else label = `${count} Batches selected`;
  const lbl = document.getElementById('bv-ms-label');
  if (lbl) lbl.textContent = label;
  // Update badge
  const btnEl = document.getElementById('bv-ms-btn');
  if (btnEl) {
    let badge = btnEl.querySelector('.bv-multiselect-badge');
    if (count > 0) {
      if (!badge) { badge = document.createElement('span'); badge.className='bv-multiselect-badge'; btnEl.querySelector('.bv-chevron').before(badge); }
      badge.textContent = count;
    } else {
      badge?.remove();
    }
  }
  // Re-render grid
  const view = document.getElementById('schedule-view');
  if (view) {
    // Save scroll + dropdown state, re-render
    const wasOpen = document.getElementById('bv-ms-dropdown')?.classList.contains('open');
    view.innerHTML = renderBatchView();
    if (wasOpen) {
      document.getElementById('bv-ms-dropdown')?.classList.add('open');
      document.getElementById('bv-ms-btn')?.classList.add('open');
    }
  }
}

function bvSelectAllBatches() {
  if (!window._bvSelectedBatches) window._bvSelectedBatches = new Set();
  const pool = window._bvCampusId
    ? DB.batches.filter(b => b.campusId === window._bvCampusId)
    : DB.batches;
  pool.forEach(b => window._bvSelectedBatches.add(b.id));

  if (view) {
    view.innerHTML = renderBatchView();
    document.getElementById('bv-ms-dropdown')?.classList.add('open');

function bvSlotQuickAdd(date, batchId, slotStart, slotEnd) {
