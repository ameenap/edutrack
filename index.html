<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduTrack — Faculty Task & Schedule System</title>
<style>
/* ── Accent override for stat c-blue to orange ── */
.c-blue{color:var(--accent) !important}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f7fa;
  --surface: #ffffff;
  --surface2: #f0f2f7;
  --border: #e2e6ef;
  --accent: #f97316;
  --accent2: #fb923c;
  --accent3: #16a34a;
  --warn: #f59e0b;
  --danger: #ef4444;
  --text: #1a1a2e;
  --text2: #64748b;
  --text3: #94a3b8;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-md: 0 8px 32px rgba(249,115,22,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4,.logo{font-family:'Nunito',sans-serif}

/* ── Auth Screen ── */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#fff7ed 0%,#f5f7fa 60%)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:48px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(249,115,22,0.1)}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:36px}
.auth-logo .mark{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),#ea580c);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;font-family:'Nunito',sans-serif;color:#fff}
.auth-logo .name{font-size:22px;font-weight:800;color:var(--text)}
.auth-logo .name span{color:var(--accent)}
.auth-card h2{font-size:26px;margin-bottom:6px;color:var(--text)}
.auth-card p{color:var(--text2);margin-bottom:28px;font-size:14px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:7px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:inherit;font-size:14px;transition:border .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent);background:#fff}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--accent),#ea580c);color:#fff;box-shadow:0 4px 14px rgba(249,115,22,0.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(249,115,22,0.45)}
.btn-secondary{background:var(--surface);color:var(--text);border:1.5px solid var(--border)}
.btn-secondary:hover{background:var(--surface2);border-color:var(--accent)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-success{background:var(--accent3);color:#fff}
.btn-warn{background:var(--warn);color:#fff}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:7px 14px;font-size:13px}
.btn-icon{padding:8px;border-radius:8px;background:var(--surface2);border:1.5px solid var(--border);color:var(--text2);cursor:pointer;display:inline-flex;align-items:center}
.btn-icon:hover{background:var(--surface);border-color:var(--accent);color:var(--accent)}
.auth-links{margin-top:20px;text-align:center;font-size:13px;color:var(--text2)}
.auth-links a{color:var(--accent);cursor:pointer;text-decoration:none;font-weight:600}
.demo-roles{margin-top:20px;padding:16px;background:#fff7ed;border-radius:12px;border:1px solid #fed7aa}
.demo-roles h4{font-size:12px;color:#c2440c;margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.demo-role-btn{display:inline-block;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid #fed7aa;background:#fff;color:#c2440c;margin:3px;font-weight:600}
.demo-role-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.error-msg{color:var(--danger);font-size:13px;margin-top:8px;padding:10px;background:rgba(239,68,68,.06);border-radius:8px;border:1px solid rgba(239,68,68,.2)}

/* ── App Layout ── */
#app{display:none;height:100vh;overflow:hidden}
.layout{display:flex;height:100%}

/* ── Sidebar ── */
.sidebar{width:248px;background:var(--surface);border-right:1.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:22px 20px 18px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-logo .mark{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#ea580c);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;font-family:'Nunito',sans-serif;color:#fff;flex-shrink:0}
.sidebar-logo .name{font-size:17px;font-weight:800;color:var(--text);font-family:'Nunito',sans-serif}
.sidebar-logo .name span{color:var(--accent)}
.nav-section{padding:16px 10px 4px}
.nav-section-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;padding:0 10px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;color:var(--text2);font-size:14px;font-weight:600;transition:all .18s;margin-bottom:2px}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.nav-item:hover{background:#fff7ed;color:var(--accent)}
.nav-item.active{background:linear-gradient(135deg,#fff7ed,#ffedd5);color:var(--accent);border-right:3px solid var(--accent)}
.sidebar-footer{margin-top:auto;padding:16px;border-top:1.5px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:var(--surface2);cursor:pointer;border:1px solid var(--border)}
.user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#ea580c);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:11px;color:var(--text2)}
.role-badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase}
.role-admin{background:#fef3c7;color:#d97706}
.role-coordinator{background:#dcfce7;color:#16a34a}
.role-faculty{background:#fff7ed;color:#ea580c}
.role-studio{background:#ede9fe;color:#7c3aed}

/* ── Main Area ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:16px 28px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0}
.page-title{font-size:20px;font-weight:800;color:var(--text);font-family:'Nunito',sans-serif}
.page-subtitle{font-size:13px;color:var(--text2);margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.notif-btn{position:relative}
.notif-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;background:var(--danger);border-radius:50%;border:2px solid var(--surface)}
.content{flex:1;overflow-y:auto;padding:28px}

/* ── Cards / Panels ── */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:22px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.card-title{font-size:15px;font-weight:700;color:var(--text)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;transition:all .2s}
.stat-card:hover{border-color:var(--accent);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.stat-label{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:8px}
.stat-value{font-size:28px;font-weight:900;font-family:'Nunito',sans-serif}
.stat-meta{font-size:12px;color:var(--text2);margin-top:4px}
.stat-icon{float:right;opacity:.2;font-size:32px}
.c-blue{color:#3b82f6}
.c-purple{color:#8b5cf6}
.c-green{color:var(--accent3)}
.c-yellow{color:var(--warn)}
.c-red{color:var(--danger)}

/* ── Tables ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;padding:10px 14px;border-bottom:1.5px solid var(--border);color:var(--text2);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;background:#fafbfc}
td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fff7ed}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.badge-blue{background:#eff6ff;color:#3b82f6}
.badge-green{background:#f0fdf4;color:#16a34a}
.badge-yellow{background:#fffbeb;color:#d97706}
.badge-red{background:#fef2f2;color:#ef4444}
.badge-purple{background:#faf5ff;color:#8b5cf6}
.badge-gray{background:#f8fafc;color:#64748b}

/* ── Modals ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,26,46,.5);z-index:100;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;width:100%;max-width:620px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,.15)}
.modal-lg{max-width:820px}
.modal-header{padding:22px 26px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-header h3{font-size:18px;font-weight:800;font-family:'Nunito',sans-serif;color:var(--text)}
.modal-body{padding:22px 26px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 26px 22px;border-top:1.5px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-shrink:0}
.close-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center;font-size:18px}
.close-btn:hover{background:var(--surface2);color:var(--text)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:500px){.form-row{grid-template-columns:1fr}}

/* ── Filter Bar ── */
.filter-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:20px}
.filter-bar input,.filter-bar select{background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:13px;min-width:140px}
.filter-bar input:focus,.filter-bar select:focus{outline:none;border-color:var(--accent)}

/* ── Conflict Alert ── */
.conflict-box{background:#fff7ed;border:1.5px solid #fed7aa;border-radius:12px;padding:14px 16px;margin-bottom:16px}
.conflict-box .conflict-title{font-weight:700;color:#c2440c;font-size:14px;margin-bottom:6px}
.conflict-box ul{margin:0;padding-left:18px;font-size:13px;color:#c2440c}

/* ── Calendar ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-head{text-align:center;font-size:11px;font-weight:700;color:var(--text2);padding:6px;text-transform:uppercase}
.cal-day{border-radius:10px;padding:6px;min-height:64px;background:var(--surface);border:1.5px solid var(--border);cursor:pointer;transition:all .2s}
.cal-day:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(249,115,22,.1)}
.cal-day.today{border-color:var(--accent);background:#fff7ed}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default}
.cal-day .day-num{font-size:12px;font-weight:700;margin-bottom:4px;color:var(--text)}
.cal-event{font-size:10px;padding:2px 6px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;cursor:pointer;position:relative}
.cal-event:hover{filter:brightness(.92)}
.cal-event.offline{background:#fff7ed;color:#c2440c;border:1px solid #fed7aa}
.cal-event.online{background:#faf5ff;color:#7c3aed;border:1px solid #e9d5ff}
.cal-event.task{background:#fffbeb;color:#d97706;border:1px solid #fde68a}
.cal-month-nav{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.cal-month-nav h3{font-size:17px;font-weight:800;font-family:'Nunito',sans-serif;color:var(--text)}

/* ── Availability slot table ── */
.avail-slot-table{width:100%;border-collapse:separate;border-spacing:0;border-radius:12px;overflow:hidden;border:1.5px solid var(--border)}
.avail-slot-table th{background:var(--surface2);padding:10px 14px;font-size:12px;font-weight:700;color:var(--text2);text-align:center;border-bottom:1.5px solid var(--border)}
.avail-slot-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle}
.avail-slot-table td:first-child{text-align:left;font-weight:600;color:var(--text1);white-space:nowrap;background:var(--surface2);min-width:130px}
.avail-slot-table tr:last-child td{border-bottom:none}
.avail-slot-table input[type=radio]{width:17px;height:17px;accent-color:var(--accent);cursor:pointer}
.avail-slot-table tr:hover td{background:rgba(249,115,22,.04)}
.avail-slot-table tr:hover td:first-child{background:var(--surface2)}
.avail-week-nav{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.avail-week-nav button{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;color:var(--text1);transition:all .15s}
.avail-week-nav button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.avail-week-label{font-size:14px;font-weight:700;color:var(--text1);flex:1;text-align:center}
.avail-locked td{background:#fafafa!important;color:var(--text3)!important}
.avail-locked input[type=radio]{opacity:.35;pointer-events:none}
.avail-past-note{font-size:11px;color:var(--danger);font-style:italic;margin-left:8px}

/* ── Priority dots ── */
.priority-high::before{content:'●';color:var(--danger);margin-right:5px}
.priority-medium::before{content:'●';color:var(--warn);margin-right:5px}
.priority-low::before{content:'●';color:var(--accent3);margin-right:5px}

/* ── Progress bar ── */
.progress-bar{background:var(--surface2);border-radius:20px;height:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),#ea580c);transition:width .4s}

/* ── Tabs ── */
.tabs{display:flex;gap:4px;background:var(--surface2);padding:4px;border-radius:12px;margin-bottom:20px}
.tab{padding:8px 18px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;color:var(--text2);transition:all .2s}
.tab.active{background:var(--surface);color:var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.08)}

/* ── Alerts / Toasts ── */
.toast-container{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;font-size:13px;min-width:260px;box-shadow:0 8px 24px rgba(0,0,0,.12);animation:slideIn .3s ease;display:flex;align-items:center;gap:10px;font-weight:600}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-success{border-left:3px solid var(--accent3)}
.toast-error{border-left:3px solid var(--danger)}
.toast-warn{border-left:3px solid var(--warn)}

/* ── Report charts ── */
.chart-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.chart-bar label{font-size:12px;width:120px;flex-shrink:0;color:var(--text2);font-weight:600}
.chart-bar .bar-track{flex:1;background:var(--surface2);border-radius:20px;height:18px;overflow:hidden}
.chart-bar .bar-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),#ea580c);display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;font-weight:700;min-width:30px;color:#fff}

/* ── Empty state ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state svg{margin:0 auto 16px;display:block;opacity:.3}
.empty-state h3{font-size:16px;color:var(--text2);margin-bottom:6px}

/* ── Avatar colors ── */
.av-0{background:linear-gradient(135deg,#f97316,#ea580c)}
.av-1{background:linear-gradient(135deg,#16a34a,#0891b2)}
.av-2{background:linear-gradient(135deg,#8b5cf6,#db2777)}
.av-3{background:linear-gradient(135deg,#3b82f6,#6366f1)}
.av-4{background:linear-gradient(135deg,#d97706,#f97316)}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#e2e6ef;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#cbd5e1}

/* ── Calendar event tooltip ── */
#cal-tooltip{
  position:fixed;z-index:999;pointer-events:none;
  background:#ffffff;border:1.5px solid #fed7aa;
  border-radius:16px;padding:0;width:264px;
  box-shadow:0 16px 48px rgba(249,115,22,0.18);
  opacity:0;transform:translateY(6px) scale(.97);
  transition:opacity .15s ease,transform .15s ease;
}
#cal-tooltip.visible{opacity:1;transform:translateY(0) scale(1)}
.ct-header{padding:12px 14px 10px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#fff7ed,#ffedd5);border-radius:16px 16px 0 0}
.ct-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.ct-name{font-size:13px;font-weight:800;color:#1a1a2e;font-family:'Nunito',sans-serif}
.ct-role{font-size:11px;color:#64748b;margin-top:1px}
.ct-body{padding:10px 14px 12px;background:#fff}
.ct-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:12px}
.ct-row:last-child{margin-bottom:0}
.ct-icon{font-size:13px;flex-shrink:0}
.ct-label{color:#94a3b8;min-width:52px;flex-shrink:0;font-weight:600}
.ct-val{color:#1a1a2e;font-weight:600}
.ct-mode-pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.04em}
.ct-mode-offline{background:#fff7ed;color:#c2440c}
.ct-mode-online{background:#faf5ff;color:#7c3aed}
.ct-footer{padding:8px 14px;border-top:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center;background:#fafbfc;border-radius:0 0 16px 16px}
.ct-date-badge{font-size:11px;color:#64748b;font-weight:600}
.ct-status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px}

/* ══════════════════════════════════════════
   MOBILE RESPONSIVE STYLES
══════════════════════════════════════════ */
.mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1.5px solid var(--border);padding:6px 0 max(6px,env(safe-area-inset-bottom));z-index:90;grid-template-columns:repeat(5,1fr);box-shadow:0 -4px 20px rgba(0,0,0,0.08)}
.mobile-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:700;transition:all .2s;border:none;background:none;font-family:inherit;width:100%}
.mobile-nav-item svg{width:22px;height:22px}
.mobile-nav-item.active{color:var(--accent)}
.mobile-nav-dot{position:absolute;top:-2px;right:-4px;width:8px;height:8px;background:var(--danger);border-radius:50%;border:2px solid var(--surface)}
.mobile-nav-wrap{position:relative;display:inline-flex}
.mobile-header{display:none;position:sticky;top:0;z-index:80;background:var(--surface);border-bottom:1.5px solid var(--border);padding:11px 16px;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.mobile-header-logo{display:flex;align-items:center;gap:8px}

.mobile-header-logo .name{font-size:15px;font-weight:800;color:var(--text);font-family:'Nunito',sans-serif}
.mobile-header-logo .name span{color:var(--accent)}
.mobile-header-right{display:flex;align-items:center;gap:6px}
.hamburger{background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;color:var(--text2);display:flex;align-items:center;-webkit-tap-highlight-color:transparent}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:150;backdrop-filter:blur(2px)}
.sidebar-overlay.open{display:block}
.sidebar.mobile-open{transform:translateX(0) !important}
.mobile-fab{display:none;position:fixed;bottom:76px;right:18px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#ea580c);color:#fff;font-size:26px;line-height:1;border:none;cursor:pointer;z-index:85;box-shadow:0 4px 18px rgba(249,115,22,0.5);align-items:center;justify-content:center;transition:transform .15s;-webkit-tap-highlight-color:transparent}
.mobile-fab:active{transform:scale(0.9)}
#mobile-page-title{font-size:15px;font-weight:800;color:var(--text);font-family:'Nunito',sans-serif;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

@media(max-width:768px){

  table{font-size:12px;min-width:480px}
  td,th{padding:8px 10px}
  .filter-bar{gap:7px}
  .filter-bar input,.filter-bar select{min-width:0;flex:1;font-size:13px}
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap;flex-wrap:nowrap}

  .modal-overlay{padding:0;align-items:flex-end}

function withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error(`${label} timed out after ${ms}ms`)), ms))
  ]);
}

//  DATA LOADING — pure Supabase, no hardcoded fallback
// ════════════════════════════════════════════════════
async function loadAllData() {
  // Table names must match EXACTLY what Supabase has (case-sensitive for quoted names)
  const tables = ['users','campuses','batches','subjects','faculty','workTypes','courses',
                  'schedules','notifications','tasks','studioBookings','studios','slotTemplates'];
  // Map JS key → actual Supabase table name (handles quoted mixed-case tables)
  const tableNameMap = {
    workTypes:      'workTypes',
    studioBookings: 'studioBookings',
    slotTemplates:  'slotTemplates',
  };
  let anyError = false;
  const promises = tables.map(async tbl => {
    const dbTable = tableNameMap[tbl] || tbl;
    try {
      const { data, error } = await sb.from(dbTable).select('*');
      if (error) {
        console.warn('[EduTrack] Load error for', dbTable, ':', error.message);
        anyError = true;
        return;
      }
      if (data && data.length > 0) {
        DB[tbl] = data;
      } else {
        DB[tbl] = [];
      }
      console.log(`[EduTrack] Loaded ${DB[tbl].length} rows from "${dbTable}"`);
    } catch(e) {
      console.warn('[EduTrack] Could not load', dbTable, e);
      anyError = true;
    }
  });
  // Load availability map
  promises.push((async () => {
    try {
      const { data } = await sb.from('availability').select('*');
      if (data) data.forEach(d => { DB.availability[d.id] = d; });
    } catch(e) { console.warn('[EduTrack] availability load error', e); }
  })());
  await Promise.all(promises);
  updateAuthDebug({
    usersLoaded: Array.isArray(DB.users),
    facultyLoaded: Array.isArray(DB.faculty),
    usersCount: DB.users?.length || 0,
    facultyCount: DB.faculty?.length || 0,
  });
  if (anyError) {
    toast('Some data could not be loaded from the database. Check your connection or Supabase configuration.', 'warn');
  }
  // Normalize schedule rows so batchIds/workTypeIds/dates are always arrays
  DB.schedules = (DB.schedules || []).map(normalizeSchedule);
  // Ensure every batch has at least 4 default time slots if none are stored
  DB.batches.forEach(b => {
    if (!b.slots || b.slots.length === 0) {
      b.slots = [
        {id:'fn1',label:'Forenoon 1',startTime:'07:00',endTime:'08:30'},
        {id:'fn2',label:'Forenoon 2',startTime:'08:30',endTime:'10:00'},
        {id:'an1',label:'Afternoon 1',startTime:'10:00',endTime:'11:30'},
        {id:'an2',label:'Afternoon 2',startTime:'11:30',endTime:'13:00'},
      ];
    }
  });
}

// Resolve JS collection key → actual Supabase table name

const _dbTableName = {
  workTypes:      'workTypes',
  studioBookings: 'studioBookings',
  slotTemplates:  'slotTemplates',
};
function dbTable(col) { return _dbTableName[col] || col; }

async function fsSet(col, id, data) {
  const { error } = await sb.from(dbTable(col)).upsert({ id, ...data }, { onConflict: 'id' });
  if (error) toast('Save error: '+error.message, 'error');
}
async function fsAdd(col, data) {
  try {
    const payload = sanitizeForDB(data);
    if (!payload.id) {
      payload.id = `${col.slice(0,3)}_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
    }
    const { data: result, error } = await sb.from(dbTable(col)).insert(payload).select().single();
    if (error) {
      console.warn('DB insert error for', col, ':', error.message, payload);
      throw new Error(error.message || `Insert failed for ${col}`);
    }
    return result?.id || payload.id;
  } catch(e) {
    console.warn('fsAdd exception:', e);
    throw e;
  }
}
async function fsUpdate(col, id, data) {
  try {
    const { error } = await sb.from(dbTable(col)).update(data).eq('id', id);
    if (error) console.warn('DB update error for', col, ':', error.message);
  } catch(e) { console.warn('fsUpdate exception:', e); }
}
async function fsDelete(col, id) {
  try {
    const { error } = await sb.from(dbTable(col)).delete().eq('id', id);
    if (error) console.warn('DB delete error for', col, ':', error.message);
  } catch(e) { console.warn('fsDelete exception:', e); }
}

// Sanitize data before sending to Supabase:
// - Remove undefined/null-ish keys that cause schema errors
// - Keep arrays as-is (Supabase supports JSONB arrays)
// - Strip local-only fields not in DB schema
function sanitizeForDB(data) {
  const out = {};
  for (const [k, v] of Object.entries(data)) {
    if (v === undefined) continue;
    out[k] = v;
  }
  return out;
}

function displayWorkTypeName(name) {
  return name || '';
}

const BUILTIN_WORK_TYPES = [
  { id: 'builtin_class', name: 'Class', mode: 'offline', icon: '📘', color: '#0ea5e9' },
];

function getWorkTypesForMode(mode) {
  const dbTypes = (DB.workTypes || []).filter(w => w.mode === mode);
  const builtins = BUILTIN_WORK_TYPES.filter(w => w.mode === mode);
  const existingNames = new Set(dbTypes.map(w => (w.name || '').trim().toLowerCase()));
  return [...builtins.filter(w => !existingNames.has((w.name || '').trim().toLowerCase())), ...dbTypes];
}

function findWorkTypeById(id) {
  return BUILTIN_WORK_TYPES.find(w => w.id === id) || DB.workTypes.find(w => w.id === id) || null;
}

// Normalize a schedule row loaded from DB so arrays are always arrays
function normalizeSchedule(s) {
  if (!s) return s;
  if (typeof s.batchIds === 'string') {
    try { s.batchIds = JSON.parse(s.batchIds); } catch(e) { s.batchIds = s.batchId ? [s.batchId] : []; }
  }
  if (!Array.isArray(s.batchIds)) s.batchIds = s.batchId ? [s.batchId] : [];
  if (typeof s.workTypeIds === 'string') {
    try { s.workTypeIds = JSON.parse(s.workTypeIds); } catch(e) { s.workTypeIds = []; }
  }
  if (!Array.isArray(s.workTypeIds)) s.workTypeIds = [];
  if (typeof s.dates === 'string') {
    try { s.dates = JSON.parse(s.dates); } catch(e) { s.dates = s.date ? [s.date] : []; }
  }
  if (!Array.isArray(s.dates)) s.dates = s.date ? [s.date] : [];
  return s;
}

function getCurrentFaculty() {
  if (!currentUser || currentUser.role !== 'faculty') return null;
  const currentEmail = (currentUser.email || '').toLowerCase();
  return DB.faculty.find(f =>
    f.id === currentUser.id ||
    f.userId === currentUser.id ||
    (f.email || '').toLowerCase() === currentEmail ||
    f.name === currentUser.name
  ) || null;
}

function normalizeValue(value) {
  return String(value ?? '').trim().toLowerCase();
}

function scheduleBelongsToFaculty(schedule, faculty) {
  if (!schedule || !faculty) return false;

  const facultyId = normalizeValue(faculty.id);
  const facultyUserId = normalizeValue(faculty.userId);
  const facultyEmail = normalizeValue(faculty.email);
  const facultyName = normalizeValue(faculty.name);

  const scheduleFacultyId = normalizeValue(schedule.facultyId);
  const scheduleUserId = normalizeValue(schedule.userId);
  const scheduleFacultyEmail = normalizeValue(schedule.facultyEmail || schedule.email);
  const scheduleFacultyName = normalizeValue(schedule.facultyName || schedule.name);

  return !!(
    (scheduleFacultyId && (scheduleFacultyId === facultyId || scheduleFacultyId === facultyUserId)) ||
    (scheduleUserId && (scheduleUserId === facultyId || scheduleUserId === facultyUserId)) ||
    (scheduleFacultyEmail && facultyEmail && scheduleFacultyEmail === facultyEmail) ||
    (scheduleFacultyName && facultyName && scheduleFacultyName === facultyName)
  );
}

function taskBelongsToFaculty(task, faculty) {
  if (!task || !faculty) return false;

  const facultyKeys = new Set(
    [faculty.id, faculty.userId, faculty.email, faculty.name]
      .map(normalizeValue)
      .filter(Boolean)
  );

  return (task.assignedFacultyIds || []).some(id => facultyKeys.has(normalizeValue(id)));
}

async function loginPrivilegedRole(role, password, errorElementId) {
  const err = document.getElementById(errorElementId);
  if (err) err.style.display = 'none';

  const pass = String(password || '').trim();
  if (!pass) {
    if (err) { err.textContent = 'Enter your password first.'; err.style.display = 'block'; }
    return;
  }

  if (DB.users.length === 0) {
    try { await loadAllData(); } catch(e) { console.warn('[EduTrack] users reload failed', e); }
  }

  const roleUser = DB.users.find(u => normalizeValue(u.role) === normalizeValue(role));
  const email = String(roleUser?.email || '').trim();
  updateAuthDebug({ lastLoginEmail: email || '-', lastError: '' });
  if (!email) {
    const msg = `No ${role} account was found in Supabase users table.`;
    updateAuthDebug({ lastError: msg });
    if (err) { err.textContent = msg; err.style.display = 'block'; }
    return;
  }

  try {
    console.log('Attempting login for role:', role, 'email:', email);
    const { error } = await auth.signIn(email, pass);
    if (!error) {
      console.log('Supabase auth succeeded');
      const localUser = DB.users.find(u => normalizeValue(u.email) === normalizeValue(email) || normalizeValue(u.role) === normalizeValue(role));
      if (localUser) {
        console.log('Found local user:', localUser.name);
        updateAuthDebug({ lastError: '' });
        await completeLocalLogin(localUser, role);
        return;
      }
      // Auth succeeded but user not in users table — create a minimal record
      const msg = `Signed in, but no ${role} profile exists in Supabase users table.`;
      updateAuthDebug({ lastError: msg });
      if (err) { err.textContent = msg; err.style.display = 'block'; }
      return;
    } else {
      console.log('Supabase auth failed:', error.message);
      const msg = error.message || 'Incorrect password. Please try again.';
      updateAuthDebug({ lastError: msg });
      if (err) { err.textContent = msg; err.style.display = 'block'; }
      return;
    }
  } catch(e) {
    console.log('Supabase error:', e.message);
    updateAuthDebug({ lastError: e.message || 'Could not connect to Supabase.' });
  }

  if (err) {
    err.textContent = authDebugState.lastError || 'Could not connect to Supabase.';
    err.style.display = 'block';
  }
}

function buildFacultyCards() {
  const grid = document.getElementById('faculty-card-grid');
  if (!grid) return;
  updateAuthDebug({ facultyLoaded: Array.isArray(DB.faculty), facultyCount: DB.faculty?.length || 0 });
  const avatarColors = [
    'linear-gradient(135deg,#f97316,#ea580c)',
    'linear-gradient(135deg,#16a34a,#0891b2)',
    'linear-gradient(135deg,#8b5cf6,#db2777)',
    'linear-gradient(135deg,#3b82f6,#6366f1)',
    'linear-gradient(135deg,#d97706,#f97316)',
    'linear-gradient(135deg,#ec4899,#8b5cf6)',
    'linear-gradient(135deg,#059669,#16a34a)',
  ];
  const facs = DB.faculty;
  if (!facs || facs.length === 0) {
    // If still empty, retry automatically after a short delay
    grid.innerHTML = '<div style="color:rgba(255,255,255,0.4);font-size:13px;padding:20px;grid-column:1/-1;text-align:center">No faculty found. Add faculty in admin settings first.</div>';
    // Retry up to 3 times in case Firestore is still loading
    if (!buildFacultyCards._retries) buildFacultyCards._retries = 0;
    if (buildFacultyCards._retries < 3) {
      buildFacultyCards._retries++;
      setTimeout(() => {
        if (!currentUser && DB.faculty.length === 0) {
          loadAllData().then(() => { mergeDefaultWorkTypes(); buildFacultyCards(); }).catch(()=>{});
        } else if (!currentUser) {
          buildFacultyCards();
        }
      }, 1500 * buildFacultyCards._retries);
    }
    return;
  }
  buildFacultyCards._retries = 0; // reset on success
  grid.innerHTML = facs.map((f, i) => {
    const grad = avatarColors[i % avatarColors.length];
    const avatarContent = f.photoUrl
      ? `<img src="${f.photoUrl}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;margin:0 auto 8px;display:block" />`
      : `<div class="fac-avatar" style="background:${grad}">${(f.code||f.name[0]).substring(0,3)}</div>`;
    return `<div class="fac-card" id="fac-card-${f.id}" onclick="selectFacultyCard('${f.id}')">
      ${avatarContent}
      <div class="fac-name">${f.name}</div>
      <div class="fac-subject">${f.subject}</div>
    </div>`;
  }).join('');
  selectedFacultyId = null;
  const btn = document.getElementById('teacher-signin-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Tap your name to sign in'; }
}

function selectFacultyCard(facId) {
  selectedFacultyId = facId;
  document.querySelectorAll('.fac-card').forEach(el => el.classList.remove('selected'));
  document.getElementById('fac-card-'+facId)?.classList.add('selected');
  const fac = DB.faculty.find(f => f.id === facId);
  const btn = document.getElementById('teacher-signin-btn');

    btn.disabled = false;
    btn.textContent = `Sign in as ${fac?.name || 'Faculty'} →`;

}

// Safety timeout: if Supabase takes too long, hide loading screen after 5s
const _loadingTimeout = setTimeout(() => {
  const ls = document.getElementById('loading-screen');
  if (ls && ls.style.display !== 'none') {
    ls.style.display = 'none';
    if (!currentUser) {
      document.getElementById('auth-screen').style.display = 'flex';
    }
  }
}, 5000);

let _authHandled = false;

async function handleAuthUser(supaUser) {
  clearTimeout(_loadingTimeout);
  updateAuthDebug({ lastError: supaUser ? 'session found, loading data...' : 'no active session, loading public data...' });
  if (supaUser) {
    if (_authHandled) return;
    _authHandled = true;
    document.getElementById('loading-screen').style.display = 'none';
    await withTimeout(loadAllData(), 8000, 'loadAllData');
    const adminUser = DB.users.find(u => u.email === supaUser.email);
    if (adminUser) {
      currentUser = adminUser;
    } else {
      const fac = DB.faculty.find(f => f.email === supaUser.email || (f.name.toLowerCase().replace(/\s+/g,'')+'@institute.edu') === supaUser.email);
      if (fac) {
        currentUser = { ...fac, role: 'faculty' };
      } else {
        toast('User not found in system. Contact admin.', 'error');
        await auth.signOut();
        document.getElementById('auth-screen').style.display = 'flex';
        _authHandled = false;
        return;
      }
    }
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    if (isMobile()) showMobileUI(true);
    buildSidebar();
    const startPage = currentUser.role === 'studio' ? 'studio' : 'schedule';
    navigateWithMobile(startPage);
  } else {
    _authHandled = false;
    clearTimeout(_loadingTimeout);
    document.getElementById('loading-screen').style.display = 'none';
    if (!currentUser) {
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
      withTimeout(loadAllData(), 8000, 'loadAllData').then(() => {
        mergeDefaultWorkTypes();
        if (currentAuthTab === 'teacher') buildFacultyCards();
      }).catch((e) => {
        updateAuthDebug({ lastError: e.message || 'loadAllData failed' });
        buildFacultyCards();
      });
    }
  }
}

sb.auth.onAuthStateChange(async (event, session) => {

// ── FAST-PATH: Check current session immediately on script start ──
(async function earlyInit() {
  try {
    updateAuthDebug({ lastError: 'checking session...' });
    const { data: { session } } = await withTimeout(sb.auth.getSession(), 8000, 'getSession');
    if (session?.user) {
      await handleAuthUser(session.user);
    } else {
      // No active session — show auth screen but load data in background
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('auth-screen').style.display = 'flex';
      // Show "loading..." in the faculty grid while we fetch
      const grid = document.getElementById('faculty-card-grid');

      updateAuthDebug({ lastError: 'loading users/faculty...' });
      await withTimeout(loadAllData(), 8000, 'loadAllData');
      mergeDefaultWorkTypes();
      buildFacultyCards();
    }
  } catch(e) {
    console.error('[EduTrack] earlyInit error:', e);
    updateAuthDebug({ lastError: e.message || 'earlyInit failed' });
    document.getElementById('loading-screen').style.display = 'none';
    if (!currentUser) {
      document.getElementById('auth-screen').style.display = 'flex';
      buildFacultyCards();
    }
  }
})();

function buildSidebar() {

// ════════════════════════════════════════════════════
//  CONFLICTS VIEW
// ════════════════════════════════════════════════════
function showConflicts(){
  // Find all schedules with faculty conflicts (same faculty, same date, overlapping times)
  const conflicts=[];
  const scheds=DB.schedules;
  for(let i=0;i<scheds.length;i++){
    for(let j=i+1;j<scheds.length;j++){
      const a=scheds[i], b=scheds[j];
      if(a.facultyId===b.facultyId && a.date===b.date && a.date){
        // Check time overlap
        const aStart=a.startTime||'00:00', aEnd=a.endTime||'23:59';
        const bStart=b.startTime||'00:00', bEnd=b.endTime||'23:59';
        if(aStart<bEnd && bStart<aEnd){
          if(!conflicts.find(c=>c.ids.includes(a.id)&&c.ids.includes(b.id))){
            conflicts.push({ids:[a.id,b.id],schedules:[a,b]});
          }
        }
      }
    }
  }
  if(!conflicts.length){toast('No conflicts found! ✅','success');return;}
  const rows=conflicts.map(c=>{
    return c.schedules.map(s=>{
      const f=DB.faculty.find(x=>x.id===s.facultyId)||{name:'?'};
      const sub=DB.subjects.find(x=>x.id===s.subjectId)||{name:'?'};
      const camp=DB.campuses.find(x=>x.id===s.campusId)||{name:'?'};
      const batches=(s.batchIds||[s.batchId]).filter(Boolean).map(bid=>DB.batches.find(b=>b.id===bid)?.name||'?').join(', ');
      return `<tr style="background:#fff7ed">
        <td><span style="background:var(--danger);color:#fff;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700">CONFLICT</span></td>
        <td style="font-weight:700;color:var(--danger)">${f.name}</td>
        <td>${s.date||'—'}</td>
        <td style="font-family:monospace">${s.startTime||'—'} – ${s.endTime||'—'}</td>
        <td>${sub.name}</td>
        <td style="font-size:12px">${camp.name} / ${batches}</td>
        <td>${s.chapter||'—'}</td>
        <td><span class="badge ${statusBadge(s.status)}">${s.status}</span></td>
        <td>
          <button class="btn-icon btn-sm" onclick="editScheduleFromConflict('${s.id}')" title="Edit">✏️</button>
          <button class="btn-icon btn-sm" onclick="deleteScheduleFromConflict('${s.id}')" title="Delete" style="margin-left:4px;color:var(--danger)">🗑️</button>
        </td>
      </tr>`;
    }).join(`<tr><td colspan="9" style="height:2px;background:var(--border);padding:0"></td></tr>`);
  }).join(`<tr><td colspan="9" style="height:8px;background:transparent;padding:0"></td></tr>`);

  showModal('⚠️ Schedule Conflicts ('+conflicts.length+')',`
    <p style="font-size:13px;color:var(--text2);margin-bottom:16px">${conflicts.length} conflict${conflicts.length>1?'s':''} detected — same faculty scheduled at overlapping times. Edit or delete to resolve.</p>
    <div class="table-wrap"><table>
      <thead><tr><th></th><th>Faculty</th><th>Date</th><th>Time</th><th>Subject</th><th>Campus/Batch</th><th>Chapter</th><th>Status</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Close</button>`
  );
  document.getElementById('modal').classList.add('modal-lg');
}

function editScheduleFromConflict(id){
  closeModal();
  setTimeout(()=>editSchedule(id), 150);
}
async function deleteScheduleFromConflict(id){
  if(!confirm('Delete this schedule?'))return;
  DB.schedules=DB.schedules.filter(s=>s.id!==id);
  await fsDelete('schedules',id);
  toast('Schedule deleted','warn');
  closeModal();
  setTimeout(()=>{navigate('dashboard');},100);
}

function filterScheduleTasks() {
  const q = (document.getElementById('sch-task-search')?.value||'').toLowerCase();
  const st = document.getElementById('sch-task-status')?.value||'';
  const pr = document.getElementById('sch-task-priority')?.value||'';
  const fac = document.getElementById('sch-task-faculty')?.value||'';
  document.querySelectorAll('#sch-task-tbody tr').forEach(row=>{
    const tid = row.dataset.id;
    if(!tid){row.style.display='';return;}
    const t = DB.tasks.find(x=>x.id===tid);
    let show = row.textContent.toLowerCase().includes(q);
    if(st && t?.status!==st) show=false;
    if(pr && t?.priority!==pr) show=false;
    if(fac && !(t?.assignedFacultyIds||[]).includes(fac)) show=false;
    row.style.display = show?'':'none';
  });
}
// ── Schedule sort state ──
let schSortCol = 'date';  // default sort by date
let schSortDir = 'asc';

function sortScheduleList(list) {
  return [...list].sort((a, b) => {
    // Always: dated rows first (asc), then undated rows at the bottom
    const hasA = !!(a.date);
    const hasB = !!(b.date);
    if (hasA !== hasB) return hasA ? -1 : 1;

    let valA, valB;
    if (schSortCol === 'date') {
      valA = a.date || '';
      valB = b.date || '';
    } else if (schSortCol === 'faculty') {
      valA = (DB.faculty.find(f=>f.id===a.facultyId)||{name:''}).name;
      valB = (DB.faculty.find(f=>f.id===b.facultyId)||{name:''}).name;
    } else if (schSortCol === 'subject') {
      valA = (DB.subjects.find(s=>s.id===a.subjectId)||{name:''}).name;
      valB = (DB.subjects.find(s=>s.id===b.subjectId)||{name:''}).name;
    } else if (schSortCol === 'status') {
      valA = a.status || '';
      valB = b.status || '';
    } else if (schSortCol === 'campus') {
      valA = (DB.campuses.find(c=>c.id===a.campusId)||{name:''}).name;
      valB = (DB.campuses.find(c=>c.id===b.campusId)||{name:''}).name;
    } else {
      valA = ''; valB = '';
    }
    const cmp = valA.localeCompare(valB);
    return schSortDir === 'asc' ? cmp : -cmp;
  });
}

function setSortCol(col) {
  if (schSortCol === col) {
    schSortDir = schSortDir === 'asc' ? 'desc' : 'asc';
  } else {
    schSortCol = col;
    schSortDir = 'asc';
  }
  // Re-render keeping current filters
  filterSchedules();
}

function sortArrow(col) {
  if (schSortCol !== col) return '<span style="opacity:0.3;font-size:10px;margin-left:3px">⇅</span>';
  return schSortDir === 'asc'
    ? '<span style="color:var(--accent);font-size:10px;margin-left:3px">▲</span>'
    : '<span style="color:var(--accent);font-size:10px;margin-left:3px">▼</span>';
}

      <th ${stickyTh} onclick="setSortCol('campus')">Campus/Batch ${sortArrow('campus')}</th>
      ${isAdmin ? `<th ${stickyTh} onclick="setSortCol('subject')">Subject ${sortArrow('subject')}</th>` : ''}

    <tbody id="sch-tbody">${rows || `<tr><td colspan="${isAdmin ? 10 : 8}"><div class="empty-state">No schedules found</div></td></tr>`}</tbody>
  </table></div></div>`;
}
function switchTab(tab) {
  const isAdmin = ['admin','coordinator'].includes(currentUser.role);
  if (!isAdmin && tab === 'tasks-sch') tab = 'list';

  // Update tab active state
  ['tab-tasks-sch','tab-list','tab-cal','tab-batch','tab-faculty'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.classList.remove('active');
  });
  const activeTab = document.getElementById('tab-'+tab);
  if(activeTab) activeTab.classList.add('active');

  // Show/hide the top Add Schedule button (only for list/calendar/batch/faculty views)
  const topAddBtn = document.getElementById('top-add-schedule-btn');
  if(topAddBtn) topAddBtn.style.display = (tab==='list'||tab==='calendar'||tab==='batch'||tab==='faculty') ? 'inline-flex' : 'none';

  const view = document.getElementById('schedule-view');
  const myFaculty = getCurrentFaculty();

  if (tab==='tasks-sch') {
    view.innerHTML = renderTasksInSchedule(isAdmin);
  } else if (tab==='calendar') {
    view.innerHTML = renderCalendarView();
  } else if (tab==='batch') {
    view.innerHTML = renderBatchView();
  } else if (tab==='faculty') {
    view.innerHTML = renderFacultyView();
  } else {
    const list = isAdmin ? DB.schedules : DB.schedules.filter(s => myFaculty && scheduleBelongsToFaculty(s, myFaculty));
    view.innerHTML = renderScheduleList(list, isAdmin);
    setTimeout(highlightTodaySchedules, 0);
  }
}

function renderCalendarView() {
  const y = calMonth.getFullYear(), m = calMonth.getMonth();
  const first = new Date(y,m,1).getDay();
  const days = new Date(y,m+1,0).getDate();
  const monthStr = calMonth.toLocaleString('default',{month:'long',year:'numeric'});
  const isFaculty = currentUser.role === 'faculty';
  const myFaculty = isFaculty ? getCurrentFaculty() : null;
  const today = new Date().toISOString().slice(0,10);
  const monthKey = `${y}-${String(m+1).padStart(2,'0')}`;
  const selectedCalendarFacultyId = isFaculty ? (myFaculty?.id || '') : (window._calendarFacultyId || 'all');
  const selectedCalendarFaculty = selectedCalendarFacultyId && selectedCalendarFacultyId !== 'all'
    ? DB.faculty.find(f => f.id === selectedCalendarFacultyId)
    : null;

  let grid = `<div class="cal-month-nav" style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap"><div style="display:flex;align-items:center;gap:16px">
    <button class="btn-icon" onclick="calPrev()">◀</button>
    <h3>${monthStr}</h3>
    <button class="btn-icon" onclick="calNext()">▶</button>
  </div>${isFaculty ? '' : `<div style="display:flex;align-items:center;gap:10px"><label for="calendar-faculty-filter" style="font-size:12px;font-weight:700;color:var(--text2);white-space:nowrap">Faculty</label><select id="calendar-faculty-filter" onchange="calChangeFaculty(this.value)" style="min-width:220px;padding:10px 12px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);font-family:inherit"><option value="all"${selectedCalendarFacultyId==='all'?' selected':''}>All Faculties</option>${DB.faculty.map(f=>`<option value="${f.id}"${selectedCalendarFacultyId===f.id?' selected':''}>${f.name}</option>`).join('')}</select></div>`}</div><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 14px 0"><span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);background:#ecfdf3;border:1px solid #86efac;padding:6px 10px;border-radius:999px"><span style="width:10px;height:10px;border-radius:50%;background:#22c55e;display:inline-block"></span>${isFaculty ? 'Your available dates' : selectedCalendarFaculty ? `${selectedCalendarFaculty.name} available` : 'Dates with faculty availability'}</span>${!isFaculty ? `<span style="font-size:12px;color:var(--text3)">Choose a faculty or use All Faculties to compare availability.</span>` : ''}</div><div class="cal-grid">`;
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{grid+=`<div class="cal-day-head">${d}</div>`});
  for(let i=0;i<first;i++) grid+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=days;d++){
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    // Filter events — faculty only sees own schedules + own tasks
    let schEvts = DB.schedules.filter(s=>s.date===dateStr);
    if (isFaculty && myFaculty) schEvts = schEvts.filter(s => scheduleBelongsToFaculty(s, myFaculty));
    if (!isFaculty && selectedCalendarFaculty) schEvts = schEvts.filter(s => scheduleBelongsToFaculty(s, selectedCalendarFaculty));
    // Tasks due on this date (faculty only sees own tasks)
    let taskEvts = DB.tasks.filter(t=>t.dueDate===dateStr);
    if (isFaculty && myFaculty) taskEvts = taskEvts.filter(t => taskBelongsToFaculty(t, myFaculty));
    if (!isFaculty && selectedCalendarFaculty) taskEvts = taskEvts.filter(t => taskBelongsToFaculty(t, selectedCalendarFaculty));
    const visibleFacultyIds = isFaculty
      ? (myFaculty?.id ? [myFaculty.id] : [])
      : (selectedCalendarFaculty ? [selectedCalendarFaculty.id] : DB.faculty.map(f => f.id));
    const availableFaculty = visibleFacultyIds
      .map(fid => DB.faculty.find(f => f.id === fid))
      .filter(Boolean)
      .filter(fac => {
        const availDays = DB.availability[fac.id]?.[monthKey]?.available || [];
        return availDays.includes(String(d)) || availDays.includes(String(d).padStart(2,'0'));
      });
    const isToday = dateStr===today;
    const isAvailabilityShown = availableFaculty.length > 0;
    const availabilityStyle = isAvailabilityShown
      ? `background:${selectedCalendarFaculty || isFaculty ? 'linear-gradient(180deg,#f0fdf4 0%, #ffffff 75%)' : 'linear-gradient(180deg,#ecfeff 0%, #ffffff 75%)'};border-color:${selectedCalendarFaculty || isFaculty ? '#86efac' : '#67e8f9'};box-shadow:inset 0 0 0 1px ${selectedCalendarFaculty || isFaculty ? 'rgba(34,197,94,0.18)' : 'rgba(6,182,212,0.18)'};`
      : '';
    const availabilityLabel = isAvailabilityShown
      ? (selectedCalendarFaculty || isFaculty ? 'Available' : `${availableFaculty.length} faculty available`)
      : '';
    grid+=`<div class="cal-day${isToday?' today':''}" style="${availabilityStyle}">
      <div class="day-num">${d}</div>
      ${availabilityLabel ? `<div style="font-size:9px;font-weight:700;color:${selectedCalendarFaculty || isFaculty ? '#15803d' : '#0f766e'};background:${selectedCalendarFaculty || isFaculty ? '#dcfce7' : '#ccfbf1'};border:1px solid ${selectedCalendarFaculty || isFaculty ? '#86efac' : '#99f6e4'};padding:2px 6px;border-radius:999px;display:inline-block;margin-bottom:4px">${availabilityLabel}</div>` : ''}
      ${schEvts.slice(0,2).map(s=>{
        const f=DB.faculty.find(f=>f.id===s.facultyId)||{name:'?'};
        const label = isFaculty ? (DB.subjects.find(x=>x.id===s.subjectId)?.name||'Class') : f.name.split(' ')[0];
        return `<div class="cal-event ${s.mode}" data-sid="${s.id}"
          onmouseenter="showCalTooltip(event,'${s.id}')"
          onmouseleave="hideCalTooltip()"
          style="font-size:9px"
        >${label}</div>`;
      }).join('')}
      ${taskEvts.slice(0,1).map(t=>`<div class="cal-event task" style="font-size:9px" title="${t.title}">📋 ${t.title.substring(0,10)}</div>`).join('')}
      ${(schEvts.length+taskEvts.length)>3?`<div onclick="showDaySchedules('${dateStr}')" style="font-size:9px;color:var(--accent);font-weight:700;cursor:pointer;padding:1px 4px;border-radius:4px;background:#fff7ed;border:1px solid #fed7aa;display:inline-block;margin-top:1px">+${schEvts.length+taskEvts.length-3} more</div>`:''}
    </div>`;
  }
  grid += '</div>';
  return `<div class="card">${grid}</div>`;
}

function filterSchedules() {
  const q=(document.getElementById('sch-search')?.value||'').toLowerCase();
  const camp=document.getElementById('sch-campus')?.value||'';
  const batch=document.getElementById('sch-batch')?.value||'';
  const mode=document.getElementById('sch-mode')?.value||'';
  const date=document.getElementById('sch-date')?.value||'';
  const isAdmin=['admin','coordinator'].includes(currentUser?.role);
  const myFaculty=getCurrentFaculty();

  // Filter from full schedule list
  let filtered = (isAdmin ? DB.schedules : DB.schedules.filter(s => myFaculty && scheduleBelongsToFaculty(s, myFaculty))).filter(s=>{
    const f=DB.faculty.find(x=>x.id===s.facultyId)||{name:'?'};
    const sub=DB.subjects.find(x=>x.id===s.subjectId)||{name:'?'};
    const camp2=DB.campuses.find(x=>x.id===s.campusId)||{name:'?'};
    const batches=(s.batchIds||[s.batchId]).filter(Boolean).map(id=>DB.batches.find(b=>b.id===id)?.name||'?').join(' ');
    const txt=(f.name+' '+sub.name+' '+(s.chapter||'')+' '+batches+' '+camp2.name).toLowerCase();
    if(q&&!txt.includes(q))return false;
    if(camp&&s.campusId!==camp)return false;
    if(batch&&!(s.batchIds||[s.batchId]).includes(batch))return false;
    if(mode&&s.mode!==mode)return false;
    if(date&&s.date!==date)return false;
    return true;
  });

  // Apply sort
  filtered = sortScheduleList(filtered);

  // Re-render tbody only (keep header frozen)
  const tbody = document.getElementById('sch-tbody');
  if(!tbody) return;
  if(!filtered.length){ tbody.innerHTML='<tr><td colspan="10"><div class="empty-state">No schedules found</div></td></tr>'; return; }

  tbody.innerHTML = filtered.map(s=>{
    const f=DB.faculty.find(f=>f.id===s.facultyId)||{name:'?'};
    const batchNames=(s.batchIds||[s.batchId]).filter(Boolean).map(id=>DB.batches.find(b=>b.id===id)?.name||'?').join(', ');
    const sub=DB.subjects.find(x=>x.id===s.subjectId)||{name:'?'};
    const campObj=DB.campuses.find(c=>c.id===s.campusId)||{name:'?'};
    const wtIds=(s.workTypeIds&&s.workTypeIds.length)?s.workTypeIds:(s.workTypeId?[s.workTypeId]:[]);
    const wtLabels=wtIds.map(wid=>{
      const w=findWorkTypeById(wid);
      return w?`<span class="badge ${s.mode==='online'?'badge-purple':'badge-blue'}" style="margin:1px 2px">${w.icon||''} ${displayWorkTypeName(w.name)}</span>`:'';
    }).join('');
    const checkboxCell=isAdmin?`<td><input type="checkbox" class="sch-row-cb" data-id="${s.id}" onchange="onRowCheckbox()" style="cursor:pointer;width:15px;height:15px;accent-color:var(--accent)" /></td>`:'';
    const modePillF=`<span style="font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;margin-left:6px;${s.mode==='online'?'background:#faf5ff;color:#7c3aed;border:1px solid #e9d5ff':'background:#fff7ed;color:#c2440c;border:1px solid #fed7aa'}">${s.mode==='online'?'💻 Online':'📍 Offline'}</span>`;
    return `<tr data-id="${s.id}">
      ${checkboxCell}
      <td>${s.date||'—'}</td>
      <td style="font-weight:600">${f.name}${modePillF}</td>
      <td>${campObj.name} / ${batchNames||'?'}</td>
      <td><span style="display:inline-flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:${sub.color||'#4f8ef7'}"></span>${sub.name}</span></td>
      <td style="font-size:12px;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.chapter||'—'}</td>
      <td style="white-space:normal;min-width:120px">${wtLabels||'<span style="color:var(--text3);font-size:12px">—</span>'}</td>
      <td style="color:var(--text2)">${s.startTime||'—'}–${s.endTime||'—'}</td>
      <td><span class="badge ${statusBadge(s.status)}">${s.status}</span></td>
      ${isAdmin?`<td style="white-space:nowrap">
        <button class="btn-icon btn-sm" onclick="editSchedule('${s.id}')" title="Edit">✏️</button>
        <button class="btn-icon btn-sm" onclick="duplicateSchedule('${s.id}')" title="Duplicate" style="margin-left:4px">📋</button>
        <button class="btn-icon btn-sm" onclick="deleteSchedule('${s.id}')" title="Delete" style="margin-left:4px">🗑️</button>
      </td>`:`<td><button class="btn btn-sm btn-secondary" onclick="updateScheduleStatus('${s.id}')">Update</button></td>`}
    </tr>`;
  }).join('');

  // Also update sort arrows in header
  document.querySelectorAll('#sch-table thead th[onclick]').forEach(th=>{
    const col=th.getAttribute('onclick').match(/setSortCol\('([^']+)'\)/)?.[1];
    if(!col)return;
    const arrow=th.querySelector('span');
    if(arrow){
      if(schSortCol===col){
        arrow.style.opacity='1';arrow.style.color='var(--accent)';
        arrow.textContent=schSortDir==='asc'?'▲':'▼';
      }else{arrow.style.opacity='0.3';arrow.style.color='';arrow.textContent='⇅';}
    }
  });
}
function onRowCheckbox(){

    if(row&&row.style.display!=='none')el.checked=cb.checked;
  });

function clearBulkSelection(){
  document.querySelectorAll('.sch-row-cb').forEach(el=>el.checked=false);
  const selAll=document.getElementById('select-all-sch');
  if(selAll){selAll.checked=false;selAll.indeterminate=false;}

async function bulkUpdateStatus(status){
  const ids=[...document.querySelectorAll('.sch-row-cb:checked')].map(el=>el.dataset.id);
  if(!ids.length)return;
  if(!confirm('Mark '+ids.length+' schedule(s) as "'+status+'"?'))return;
  for(const id of ids){
    const s=DB.schedules.find(x=>x.id===id);
    if(s)s.status=status;
    await fsUpdate('schedules',id,{status});
  }
  toast(ids.length+' schedules marked as '+status,'success');
  clearBulkSelection();navigate('schedule');
}
async function bulkDelete(){
  const ids=[...document.querySelectorAll('.sch-row-cb:checked')].map(el=>el.dataset.id);
  if(!ids.length)return;
  if(!confirm('Delete '+ids.length+' schedule(s)? This cannot be undone.'))return;
  for(const id of ids){
    DB.schedules=DB.schedules.filter(s=>s.id!==id);
    await fsDelete('schedules',id);
  }
  toast(ids.length+' schedules deleted','warn');
  clearBulkSelection();navigate('schedule');
}

function editSchedule(id) {
  editingId=id;
  const s=DB.schedules.find(x=>x.id===id);
  if(!s) return;

  // ── Pre-load state arrays from saved schedule ──
  selectedWorkTypes  = s.workTypeIds?.length ? [...s.workTypeIds] : (s.workTypeId ? [s.workTypeId] : []);
  selectedBatchIds   = s.batchIds?.length    ? [...s.batchIds]   : (s.batchId   ? [s.batchId]   : []);
  selectedMultiDates = s.dates?.length > 1   ? [...s.dates]      : [];
  selectedFacultyIds = s.facultyId           ? [s.facultyId]     : [];

  showModal('Edit Schedule', buildScheduleForm(s), `
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveSchedule()">Save Changes</button>
  `);
  document.getElementById('modal').classList.add('modal-lg');

  // ── Restore dependent fields after DOM is ready ──
  setTimeout(() => {
    const mode = s.mode || 'offline';

    if (mode === 'offline') {
      // Restore subject
      const subId = s.subjectId;
      const subEl = document.getElementById('f-subject');
      if (subEl && subId) subEl.value = subId;
      const sub = DB.subjects.find(x=>x.id===subId);

      // Restore faculty chips
      const facChipContainer = document.getElementById('faculty-chips-offline');
      if (facChipContainer && sub) {
        const facs = DB.faculty.filter(f=>f.subject===sub.name);
        facChipContainer.innerHTML = renderFacultyChips(facs, 'offline', selectedFacultyIds);
      }

      // Restore batch chips for saved campus
      const cid = s.campusId;
      const campEl = document.getElementById('f-campus');
      if (campEl && cid) campEl.value = cid;
      const container = document.getElementById('batch-chips-offline');
      if (container && cid) {
        const batches = DB.batches.filter(b=>b.campusId===cid);
        container.innerHTML = batches.map(b=>{
          const sel = selectedBatchIds.includes(b.id);
          return `<button type="button" onclick="toggleBatchChip('${b.id}')" id="batch-chip-${b.id}"
            style="padding:6px 12px;border-radius:20px;border:1.5px solid ${sel?'var(--accent)':'var(--border)'};
            background:${sel?'rgba(249,115,22,0.15)':'var(--surface2)'};color:${sel?'var(--accent)':'var(--text2)'};
            font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s">${b.name}</button>`;
        }).join('');
      }

      // Restore work type chips
      const offlineTypes = getWorkTypesForMode('offline');
      offlineTypes.forEach(w=>{
        const btn = document.getElementById('wt-chip-'+w.id);
        if (!btn) return;
        const sel = selectedWorkTypes.includes(w.id);
        btn.style.background = sel ? w.color : 'var(--surface2)';
        btn.style.color = sel ? '#fff' : 'var(--text)';
      });

    } else {
      // Online mode — restore subject
      const subId = s.subjectId;
      const subEl = document.getElementById('f-subject-online');
      if (subEl && subId) subEl.value = subId;
      const sub = DB.subjects.find(x=>x.id===subId);

      // Restore faculty chips
      const facChipContainerOnline = document.getElementById('faculty-chips-online');
      if (facChipContainerOnline && sub) {
        const facs = DB.faculty.filter(f=>f.subject===sub.name);
        facChipContainerOnline.innerHTML = renderFacultyChips(facs, 'online', selectedFacultyIds);
      }

      // Restore batch chips (online uses renderAllBatchChips with selectedBatchIds)
      const onlineContainer = document.getElementById('batch-chips-online');
      if (onlineContainer) {
        onlineContainer.innerHTML = renderAllBatchChips(selectedBatchIds);
      }

      // Restore work type chips
      const onlineTypes = getWorkTypesForMode('online');
      onlineTypes.forEach(w=>{
        const btn = document.getElementById('wt-chip-'+w.id);
        if (!btn) return;
        const sel = selectedWorkTypes.includes(w.id);
        btn.style.background = sel ? w.color : 'var(--surface2)';
        btn.style.color = sel ? '#fff' : 'var(--text)';
      });
    }

    syncSubjectFromSelectedFaculty(mode);
    showFacultyInfo();
    checkConflicts();
  }, 80);
}
function buildScheduleForm(s, prefillDate, prefillBatchId, prefillFacultyId) {
  const mode = s?.mode || 'offline';
  const offlineTypes = getWorkTypesForMode('offline');
  const onlineTypes = getWorkTypesForMode('online');
  const selectedTypes = s?.workTypeIds || (s?.workTypeId ? [s.workTypeId] : []);
  
  // Pre-populate faculty if prefillFacultyId is provided

// Selected work type IDs
let selectedWorkTypes = [];
// Selected batch IDs
let selectedBatchIds = [];
// Selected multi dates
let selectedMultiDates = [];
// Selected faculty IDs (multi-faculty feature)
let selectedFacultyIds = [];

function onModeToggle(mode) {
  document.getElementById('mode-btn-offline').style.background = mode==='offline'?'linear-gradient(135deg,var(--accent),#ea580c)':'transparent';
  document.getElementById('mode-btn-offline').style.color = mode==='offline'?'#fff':'var(--text2)';
  document.getElementById('mode-btn-online').style.background = mode==='online'?'linear-gradient(135deg,var(--accent),#ea580c)':'transparent';
  document.getElementById('mode-btn-online').style.color = mode==='online'?'#fff':'var(--text2)';
  document.getElementById('offline-section').style.display = mode==='offline'?'block':'none';
  document.getElementById('online-section').style.display = mode==='online'?'block':'none';
  selectedWorkTypes = [];
  // Re-render faculty chips for the newly active mode, preserving current selection
  const subElId = mode==='offline' ? 'f-subject' : 'f-subject-online';
  const courseElId = mode==='offline' ? 'f-course' : 'f-course-online';
  const chipContainerId = mode==='offline' ? 'faculty-chips-offline' : 'faculty-chips-online';
  const subId = document.getElementById(subElId)?.value;
  const sub = subId ? DB.subjects.find(s=>s.id===subId) : null;
  const facs = sub ? DB.faculty.filter(f=>f.subject===sub.name) : DB.faculty;
  const container = document.getElementById(chipContainerId);
  if (container) container.innerHTML = renderFacultyChips(facs, mode, selectedFacultyIds);
  syncSubjectFromSelectedFaculty(mode);
  const courseEl = document.getElementById(courseElId);
  if (courseEl) courseEl.onchange = () => syncSubjectFromSelectedFaculty(mode);
  setTimeout(showFacultyInfo, 30);
}

function toggleWorkType(id, mode) {
  const idx = selectedWorkTypes.indexOf(id);
  if (idx > -1) selectedWorkTypes.splice(idx,1);
  else selectedWorkTypes.push(id);
  const types = getWorkTypesForMode(mode);
  types.forEach(w => {
    const btn = document.getElementById('wt-chip-'+w.id);
    if (!btn) return;
    const sel = selectedWorkTypes.includes(w.id);
    btn.style.background = sel ? w.color : 'var(--surface2)';
    btn.style.color = sel ? '#fff' : 'var(--text)';
    btn.style.borderColor = sel ? w.color : 'var(--border)';
  });
}

function renderAllBatchChips(selectedIds=[]) {
  if (!DB.batches || DB.batches.length===0) return '<span style="color:var(--text3);font-size:13px">No batches available</span>';
  return DB.batches.map(b=>{
    const sel = selectedIds.includes(b.id);
    return `<button type="button" onclick="toggleBatchChip('${b.id}')" id="batch-chip-${b.id}" style="padding:6px 12px;border-radius:20px;border:1.5px solid ${sel?'var(--accent)':'var(--border)'};background:${sel?'rgba(249,115,22,0.15)':'var(--surface2)'};color:${sel?'var(--accent)':'var(--text2)'};font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s">${b.name}</button>`;
  }).join('');
  highlightTodaySchedules();
}

function highlightTodaySchedules() {
  const tbody = document.getElementById('sch-tbody');
  if (!tbody) return;
  const today = new Date().toISOString().slice(0,10);

  tbody.querySelectorAll('tr[data-id]').forEach(row => {
    row.style.background = '';
    row.style.boxShadow = '';
    row.dataset.todaySchedule = '';
    const badge = row.querySelector('.today-sch-badge');
    if (badge) badge.remove();

    const schedule = DB.schedules.find(s => s.id === row.dataset.id);
    if (!schedule || schedule.date !== today) return;

    row.style.background = '#fff7ed';
    row.style.boxShadow = 'inset 4px 0 0 var(--accent)';
    row.dataset.todaySchedule = 'true';

    const isAdminView = ['admin','coordinator'].includes(currentUser?.role);
    const dateCell = row.children[isAdminView ? 1 : 0] || row.children[0];
    if (!dateCell) return;
    dateCell.innerHTML = `<span style="font-weight:800;color:var(--accent)">${schedule.date}</span> <span class="badge badge-yellow today-sch-badge" style="margin-left:6px">Today</span>`;
  });
}

function goToTodaySchedules() {
  const tableWrap = document.querySelector('#sch-table')?.closest('.table-wrap');
  const todayRow = document.querySelector('#sch-tbody tr[data-today-schedule="true"]')
    || [...document.querySelectorAll('#sch-tbody tr[data-id]')].find(row => {
      const schedule = DB.schedules.find(s => s.id === row.dataset.id);
      return schedule?.date === new Date().toISOString().slice(0,10);
    });

  if (!todayRow) {
    toast('No schedule found for today in the current list','warn');
    return;
  }

  todayRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
  todayRow.animate(
    [
      { boxShadow: 'inset 4px 0 0 var(--accent), 0 0 0 rgba(249,115,22,0)' },
      { boxShadow: 'inset 4px 0 0 var(--accent), 0 0 0 6px rgba(249,115,22,0.18)' },
      { boxShadow: 'inset 4px 0 0 var(--accent), 0 0 0 rgba(249,115,22,0)' }
    ],
    { duration: 1200, easing: 'ease-out' }
  );

  if (tableWrap && todayRow.closest('.table-wrap') === tableWrap) {
    tableWrap.scrollBy({ top: -24, behavior: 'smooth' });
  }
}

function toggleBatchChip(id) {
  const idx = selectedBatchIds.indexOf(id);
  if (idx > -1) selectedBatchIds.splice(idx,1);
  else selectedBatchIds.push(id);
  const btn = document.getElementById('batch-chip-'+id);
  if (!btn) return;
  const sel = selectedBatchIds.includes(id);
  btn.style.borderColor = sel ? 'var(--accent)' : 'var(--border)';
  btn.style.background = sel ? 'rgba(249,115,22,0.15)' : 'var(--surface2)';
  btn.style.color = sel ? 'var(--accent)' : 'var(--text2)';
  // Auto-set course from first selected batch
  if (selectedBatchIds.length > 0) {
    const firstBatch = DB.batches.find(b => b.id === selectedBatchIds[0]);
    if (firstBatch?.course) {
      // Find matching course id
      const matchedCourse = DB.courses.find(c => c.name === firstBatch.course || firstBatch.course.includes(c.name));
      const courseEl = document.getElementById('f-course') || document.getElementById('f-course-online');
      if (courseEl && matchedCourse) {
        courseEl.value = matchedCourse.id;
        // Trigger subject sync
        const mode = document.getElementById('offline-section')?.style.display !== 'none' ? 'offline' : 'online';
        syncSubjectFromSelectedFaculty(mode);
      }
    }
  }
}

function onCourseSubjectChange() {
  syncSubjectFromSelectedFaculty('offline');
}
function onCourseSubjectChangeOnline() {
  syncSubjectFromSelectedFaculty('online');
}

function getCourseNameById(courseId) {
  return DB.courses.find(c => c.id === courseId)?.name || '';
}

function getSubjectForFaculty(facultyId, courseId='') {
  const faculty = DB.faculty.find(f => f.id === facultyId);
  if (!faculty?.subject) return null;
  const facultySubject = String(faculty.subject).trim().toLowerCase();
  const courseName = getCourseNameById(courseId).trim().toLowerCase();
  const matched = DB.subjects.filter(sub => String(sub.name || '').trim().toLowerCase() === facultySubject);
  if (!matched.length) return null;
  if (!courseName) return matched[0];
  return matched.find(sub => String(sub.course || '').toLowerCase().split(',').map(x => x.trim()).includes(courseName)) || matched[0];
}

function syncSubjectFromSelectedFaculty(mode) {
  const subjectSelect = document.getElementById(mode === 'offline' ? 'f-subject' : 'f-subject-online');
  const courseId = document.getElementById(mode === 'offline' ? 'f-course' : 'f-course-online')?.value || '';
  if (!subjectSelect) return;

  const subjects = selectedFacultyIds
    .map(fid => getSubjectForFaculty(fid, courseId))
    .filter(Boolean);

  const uniqueIds = [...new Set(subjects.map(sub => sub.id))];
  const currentValue = subjectSelect.value;
  subjectSelect.disabled = false;
  subjectSelect.title = selectedFacultyIds.length > 0 ? 'Subject is fetched automatically from selected faculty' : '';

  if (!selectedFacultyIds.length) return;
  if (uniqueIds.length === 1) {
    if (!currentValue || !uniqueIds.includes(currentValue)) {
      subjectSelect.value = uniqueIds[0];
    }
  } else {
    if (currentValue && uniqueIds.includes(currentValue)) return;
    subjectSelect.value = '';
  }
}

function toggleFacultyChip(id, mode) {
  const idx = selectedFacultyIds.indexOf(id);
  if (idx > -1) {
    selectedFacultyIds.splice(idx, 1);
  } else {
    selectedFacultyIds.push(id);
  }
  // Update ALL chip buttons for this mode directly by ID
  DB.faculty.forEach(f => {
    const btn = document.getElementById('fac-chip-' + mode + '-' + f.id);
    if (!btn) return;
    const sel = selectedFacultyIds.includes(f.id);
    btn.style.borderColor = sel ? '#f97316' : '';
    btn.style.background  = sel ? 'rgba(249,115,22,0.15)' : '';
    btn.style.color       = sel ? '#f97316' : '';
    btn.style.fontWeight  = sel ? '700' : '600';
    btn.style.outline     = sel ? '2px solid #f97316' : 'none';
  });
  syncSubjectFromSelectedFaculty(mode);
  showFacultyInfo();
  checkConflicts();
}

function renderFacultyChips(facs, mode, selectedIds=[]) {
  if (!facs || facs.length === 0) return '<span style="color:#94a3b8;font-size:13px;align-self:center">No faculty available</span>';
  return facs.map(f => {
    const sel = selectedIds.includes(f.id);
    return `<button type="button" onclick="toggleFacultyChip('${f.id}','${mode}')" id="fac-chip-${mode}-${f.id}" style="padding:6px 14px;border-radius:20px;border:1.5px solid ${sel?'#f97316':'#e2e6ef'};background:${sel?'rgba(249,115,22,0.15)':'#ffffff'};color:${sel?'#f97316':'#64748b'};font-family:inherit;font-size:13px;font-weight:${sel?'700':'600'};cursor:pointer;transition:all .2s;${sel?'outline:2px solid #f97316;':''}">${f.name}</button>`;
  }).join('');
}

function onSubjectChange() {
  const subId = document.getElementById('f-subject')?.value;
  const sub = DB.subjects.find(s=>s.id===subId);
  const container = document.getElementById('faculty-chips-offline');
  if (!container) return;
  const facs = sub ? DB.faculty.filter(f=>f.subject===sub.name) : DB.faculty;
  // Don't clear selectedFacultyIds — keep any pre-set selection, just remove IDs not in new list
  selectedFacultyIds = selectedFacultyIds.filter(id => facs.some(f=>f.id===id));
  container.innerHTML = renderFacultyChips(facs, 'offline', selectedFacultyIds);
  syncSubjectFromSelectedFaculty('offline');
  setTimeout(showFacultyInfo, 30);
}

function onSubjectChangeOnline() {
  const subId = document.getElementById('f-subject-online')?.value;
  const sub = DB.subjects.find(s=>s.id===subId);
  const container = document.getElementById('faculty-chips-online');
  if (!container) return;
  const facs = sub ? DB.faculty.filter(f=>f.subject===sub.name) : DB.faculty;
  // Don't clear selectedFacultyIds — keep any pre-set selection, just remove IDs not in new list
  selectedFacultyIds = selectedFacultyIds.filter(id => facs.some(f=>f.id===id));
  container.innerHTML = renderFacultyChips(facs, 'online', selectedFacultyIds);
  syncSubjectFromSelectedFaculty('online');
  setTimeout(showFacultyInfo, 30);
}

function buildMultiDatePicker(selectedDates=[]) {
  selectedMultiDates = [...selectedDates];
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  const days = new Date(y,m+1,0).getDate();
  const first = new Date(y,m,1).getDay();
  let html = `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center">`;

  for(let i=0;i<first;i++) html += `<div></div>`;
  for(let d=1;d<=days;d++){
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const sel = selectedDates.includes(ds);
    html += `<div onclick="toggleMultiDateDay('${ds}')" id="mday-${ds}" style="padding:5px 2px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;background:${sel?'var(--accent)':'transparent'};color:${sel?'#fff':'var(--text)'};transition:all .15s">${d}</div>`;
  }
  html += '</div>';
  return html;
}

  const batches = cid ? DB.batches.filter(b=>b.campusId===cid) : [];

function checkConflicts() {
  const fids = selectedFacultyIds.length > 0 ? selectedFacultyIds : (document.getElementById('f-faculty')?.value ? [document.getElementById('f-faculty').value] : []);
  const date=document.getElementById('f-date')?.value;
  const start=document.getElementById('f-start')?.value;
  const end=document.getElementById('f-end')?.value;
  if(!fids.length||!date||!start||!end) return;
  const conflicts=[];
  fids.forEach(fid => {
    DB.schedules.filter(s=>s.id!==editingId).forEach(s=>{
      if(s.date===date && s.facultyId===fid && timesOverlap(s.startTime,s.endTime,start,end)){
        const f=DB.faculty.find(f=>f.id===fid)||{name:'?'};
        conflicts.push(`${f.name} already scheduled at ${s.startTime}–${s.endTime}`);
      }
    });
    // check availability
    const fac=DB.faculty.find(f=>f.id===fid);
    const ym=date.substring(0,7);
    const avail=DB.availability[fid]?.[ym];
    if(avail && !avail.available.includes(date.substring(8))){
      const f=DB.faculty.find(f=>f.id===fid)||{name:'?'};
      conflicts.push(`${f.name} is marked unavailable on ${date}`);
    }
    if(fac){
      const monthSessions=DB.schedules.filter(s=>s.facultyId===fid&&s.date.startsWith(date.substring(0,7))&&s.id!==editingId);
      const uniqueDays=new Set(monthSessions.map(s=>s.date));
      if(!uniqueDays.has(date)&&uniqueDays.size>=fac.maxDays){
        conflicts.push(`Monthly limit reached: ${fac.name} has ${uniqueDays.size}/${fac.maxDays} working days`);
      }
    }
  });
  const area=document.getElementById('conflict-area');
  if(area){
    area.innerHTML=conflicts.length?`<div class="conflict-box"><div class="conflict-title">⚠️ Conflict Detected</div><ul>${conflicts.map(c=>`<li>${c}</li>`).join('')}</ul></div>`:'';
  }
  return conflicts;
}
function timesOverlap(s1,e1,s2,e2){return s1<e2&&s2<e1}
