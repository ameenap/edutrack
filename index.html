    // Pre-fill slot times (the key new behaviour)
    const startEl = document.getElementById('f-start');
    const endEl = document.getElementById('f-end');
    if (startEl) startEl.value = slotStart;
    if (endEl) endEl.value = slotEnd;
    // Also pre-fill date
    const dateEl = document.getElementById('f-date');
    if (dateEl && date) dateEl.value = date;
    // Trigger conflict check with new times
    setTimeout(checkConflicts, 50);
  }, 50);
}

// ════════════════════════════════════════════════════
// FACULTY VIEW — rows = faculty, columns = time slots, single date
// ════════════════════════════════════════════════════
function renderFacultyView() {
  const todayStr = new Date().toISOString().slice(0,10);
  const selectedDate = window._fvDate || todayStr;
  const isToday = selectedDate === todayStr;

  if (!window._fvSelectedFaculty) window._fvSelectedFaculty = new Set();
  const selectedFacultyIds = window._fvSelectedFaculty;

  // Faculty pool — all or filtered by selection
  const allFaculty = DB.faculty;
  const facultyPool = selectedFacultyIds.size > 0
    ? allFaculty.filter(f => selectedFacultyIds.has(f.id))
    : allFaculty;

  // Multi-select button label
  const fvSelCount = selectedFacultyIds.size;
  const fvBtnLabel = fvSelCount === 0
    ? 'All Faculty'
    : fvSelCount === 1
      ? (allFaculty.find(f => selectedFacultyIds.has(f.id))?.name || '1 Faculty')
      : `${fvSelCount} Faculty selected`;

  // Date navigation
  const selDateObj = new Date(selectedDate + 'T00:00:00');
  const dateFmt = selDateObj.toLocaleDateString('default', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  const prevDay = new Date(selDateObj); prevDay.setDate(prevDay.getDate()-1);
  const nextDay = new Date(selDateObj); nextDay.setDate(nextDay.getDate()+1);
  const prevStr = prevDay.toISOString().slice(0,10);
  const nextStr = nextDay.toISOString().slice(0,10);

  // All schedules for selected date
  const daySchedules = DB.schedules.filter(s => s.date === selectedDate);

  // Stats across visible faculty pool
  const poolIds = new Set(facultyPool.map(f=>f.id));
  const poolScheds = daySchedules.filter(s =>
    poolIds.has(s.facultyId) || (s.facultyIds||[]).some(id=>poolIds.has(id))
  );
  const totalSched = poolScheds.length;
  const completedSched = poolScheds.filter(s=>s.status==='Completed').length;
  const pendingSched = poolScheds.filter(s=>s.status==='Scheduled'||s.status==='Pending').length;
  const cancelledSched = poolScheds.filter(s=>s.status==='Cancelled').length;

  // Time slots 7:00–21:30 in 30-min steps
  const timeSlots = [];
  for (let h = 7; h <= 21; h++) {
    for (let m = 0; m < 60; m += 30) {
      timeSlots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    }
  }

  // ── Build timetable: rows = faculty, cols = time slots ──
  let timetableHtml = `
  <div style="overflow-x:auto;border:1.5px solid var(--border);border-radius:12px;background:var(--surface)">
  <table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead style="position:sticky;top:0;background:var(--surface2);z-index:10">
      <tr>
        <th style="padding:10px 14px;min-width:150px;text-align:left;border-right:1.5px solid var(--border);font-weight:700;color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.07em">Faculty</th>
        ${timeSlots.map(t=>`<th style="padding:8px;min-width:72px;border-right:1px solid var(--border);text-align:center;font-size:11px;font-weight:700;background:var(--surface2)">${t}</th>`).join('')}
      </tr>
    </thead>
    <tbody>`;

  facultyPool.forEach(faculty => {
    const facScheds = daySchedules.filter(s =>
      s.facultyId === faculty.id || (s.facultyIds||[]).includes(faculty.id)
    );

    timetableHtml += `
      <tr>
        <td style="padding:8px 12px;min-width:150px;border-right:1.5px solid var(--border);border-bottom:1px solid var(--border);background:var(--surface2);position:sticky;left:0;z-index:5;">
          <div style="font-weight:800;font-size:13px;color:var(--text)">${faculty.name||'—'}</div>
          ${faculty.code?`<div style="font-size:11px;color:var(--accent);font-weight:700;margin-top:1px">${faculty.code}</div>`:''}
          <div style="font-size:11px;color:var(--text3);margin-top:1px">${faculty.email||''}</div>
        </td>`;

    // Track which time columns are already consumed by a spanning session
    const consumed = new Set();

    timeSlots.forEach((ts, tsIdx) => {
      if (consumed.has(tsIdx)) return;

      const match = facScheds.find(s => {
        const st = s.startTime || '07:00';
        const et = s.endTime || '08:00';
        return st <= ts && ts < et;
      });

      if (match) {
        // Calculate colspan
        const endT = match.endTime || ts;
        let colspan = 1;
        for (let j = tsIdx + 1; j < timeSlots.length; j++) {
          if (endT > timeSlots[j]) { colspan++; consumed.add(j); }
          else break;
        }
        const batch = DB.batches.find(b => b.id === (match.batchIds?.[0] || match.batchId));
        const subject = DB.subjects.find(s => s.id === match.subjectId);
        const modeBg = match.mode==='online'?'#faf5ff':'#fff7ed';
        const modeColor = match.mode==='online'?'#7c3aed':'#c2440c';
        const modeBorder = match.mode==='online'?'#d8b4fe':'#fdba74';
        const modeIcon = match.mode==='online'?'💻':'📍';
        const statusDot = match.status==='Completed'?'#16a34a':match.status==='Cancelled'?'#94a3b8':match.status==='Postponed'?'#f59e0b':'#3b82f6';
        const statusLabel = match.status||'Scheduled';

        timetableHtml += `<td colspan="${colspan}" style="padding:4px 5px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);vertical-align:top;background:var(--surface);">
          <div style="background:${modeBg};border:2px solid ${modeBorder};border-radius:8px;padding:7px 9px;cursor:pointer;font-size:11px;min-height:62px;display:flex;flex-direction:column;gap:3px;transition:box-shadow .15s"
            onclick="editSchedule('${match.id}')"

            onmouseout="this.style.boxShadow='none'">
            <div style="display:flex;align-items:center;gap:5px">
              <span>${modeIcon}</span>
              <span style="width:7px;height:7px;border-radius:50%;background:${statusDot};flex-shrink:0"></span>
              <span style="color:var(--text3);font-weight:600;font-size:10px">${statusLabel}</span>
              ${colspan>1?`<span style="margin-left:auto;font-size:10px;color:${modeColor};font-weight:700;background:${modeBg};border:1px solid ${modeBorder};border-radius:20px;padding:1px 6px">${match.startTime}–${match.endTime}</span>`:''}
            </div>
            <div style="font-weight:800;font-size:12px;color:${modeColor}">${subject?.name||'—'}</div>
            <div style="font-size:11px;color:var(--text2);font-weight:600">${batch?.name||'—'}</div>
          </div>
        </td>`;
      } else {
        timetableHtml += `<td style="padding:3px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);text-align:center;vertical-align:middle;background:var(--surface);">
          <div onclick="fvQuickAdd('${selectedDate}','${faculty.id}')"
            style="cursor:pointer;opacity:.35;font-size:16px;transition:opacity .15s"
            onmouseover="this.style.opacity='1';this.style.color='var(--accent)'"
            onmouseout="this.style.opacity='.35';this.style.color='inherit'"
            title="Add schedule">+</div>
        </td>`;
      }
    });

    timetableHtml += `</tr>`;
  });

  timetableHtml += `</tbody></table></div>`;

  return `
  <style>
  .fv-toolbar{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:18px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px}
  .fv-select{background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:13px;font-weight:600;min-width:200px;cursor:pointer}
  .fv-select:focus{outline:none;border-color:var(--accent)}
  .fv-date-input{background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
  .fv-date-input:focus{outline:none;border-color:var(--accent)}
  .fv-day-nav{display:flex;align-items:center;gap:6px;margin-left:auto}
  .fv-nav-btn{padding:7px 14px;border-radius:8px;background:var(--surface2);border:1.5px solid var(--border);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}

  /* ── Multi-select faculty dropdown ── */

// ── Faculty multi-select helpers ──
function fvToggleFacultyDropdown(e) {
  e.stopPropagation();
  const btn = document.getElementById('fv-ms-btn');
  const dd  = document.getElementById('fv-ms-dropdown');
  const isOpen = dd.classList.contains('open');
  if (isOpen) { dd.classList.remove('open'); btn.classList.remove('open'); }
  else { dd.classList.add('open'); btn.classList.add('open'); setTimeout(()=>document.getElementById('fv-dd-search-input')?.focus(),60); }
}

document.addEventListener('click', function(e) {
  const wrap = document.getElementById('fv-ms-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('fv-ms-dropdown')?.classList.remove('open');
    document.getElementById('fv-ms-btn')?.classList.remove('open');
  }
});

function fvToggleFaculty(facId, el) {
  if (!window._fvSelectedFaculty) window._fvSelectedFaculty = new Set();
  if (window._fvSelectedFaculty.has(facId)) { window._fvSelectedFaculty.delete(facId); el.classList.remove('checked'); }
  else { window._fvSelectedFaculty.add(facId); el.classList.add('checked'); }
  const count = window._fvSelectedFaculty.size;
  let label;
  if (count === 0) label = 'All Faculty';
  else if (count === 1) label = DB.faculty.find(f=>window._fvSelectedFaculty.has(f.id))?.name || '1 Faculty';
  else label = `${count} Faculty selected`;
  const lbl = document.getElementById('fv-ms-label');
  if (lbl) lbl.textContent = label;
  const btnEl = document.getElementById('fv-ms-btn');
  if (btnEl) {
    let badge = btnEl.querySelector('.fv-multiselect-badge');
    if (count > 0) {
      if (!badge) { badge = document.createElement('span'); badge.className='fv-multiselect-badge'; btnEl.querySelector('.fv-chevron').before(badge); }
      badge.textContent = count;
    } else { badge?.remove(); }
  }
  const view = document.getElementById('schedule-view');
  if (view) {
    const wasOpen = document.getElementById('fv-ms-dropdown')?.classList.contains('open');
    view.innerHTML = renderFacultyView();
    if (wasOpen) { document.getElementById('fv-ms-dropdown')?.classList.add('open'); document.getElementById('fv-ms-btn')?.classList.add('open'); }
  }
}

function fvSelectAllFaculty() {
  if (!window._fvSelectedFaculty) window._fvSelectedFaculty = new Set();
  DB.faculty.forEach(f => window._fvSelectedFaculty.add(f.id));
  const view = document.getElementById('schedule-view');
  if (view) { view.innerHTML = renderFacultyView(); document.getElementById('fv-ms-dropdown')?.classList.add('open'); document.getElementById('fv-ms-btn')?.classList.add('open'); }
}

function fvClearFaculty() {
  window._fvSelectedFaculty = new Set();
  const view = document.getElementById('schedule-view');
  if (view) { view.innerHTML = renderFacultyView(); document.getElementById('fv-ms-dropdown')?.classList.add('open'); document.getElementById('fv-ms-btn')?.classList.add('open'); }
}

function fvFilterFacultyList(query) {
  const items = document.querySelectorAll('#fv-dd-list .fv-dd-item');
  const q = query.toLowerCase().trim();
  items.forEach(item => { item.style.display = (!q || (item.dataset.facName||'').includes(q)) ? '' : 'none'; });
}

function fvChangeFaculty(facultyId) {
  // legacy single-select compat
  if (!window._fvSelectedFaculty) window._fvSelectedFaculty = new Set();
  window._fvSelectedFaculty.clear();
  if (facultyId) window._fvSelectedFaculty.add(facultyId);
  const view = document.getElementById('schedule-view');
  if(view) view.innerHTML = renderFacultyView();
}

function fvChangeDate(dateStr) {
  window._fvDate = dateStr;
  const view = document.getElementById('schedule-view');
  if(view) view.innerHTML = renderFacultyView();
}

function fvDayNav(dateStr) {
  window._fvDate = dateStr;
  const view = document.getElementById('schedule-view');
  if(view) view.innerHTML = renderFacultyView();
}

function fvWeekNav(dir) {
  const cur = new Date((window._fvDate || new Date().toISOString().slice(0,10)) + 'T00:00:00');
  cur.setDate(cur.getDate() + dir * 7);
  window._fvDate = cur.toISOString().slice(0,10);
  const view = document.getElementById('schedule-view');
  if(view) view.innerHTML = renderFacultyView();
}

function fvGoToday() {
  window._fvDate = new Date().toISOString().slice(0,10);
  const view = document.getElementById('schedule-view');
  if(view) view.innerHTML = renderFacultyView();
}

function fvQuickAdd(date, facultyId) {
  openAddSchedule(date, null, facultyId);
}

async function studioQuickConfirm(studioId) {
  const facId = document.getElementById('qb-fac')?.value;
  const start = document.getElementById('qb-start')?.value;
  const end   = document.getElementById('qb-end')?.value;
  const purp  = document.getElementById('qb-purpose')?.value;
  if (!facId||!start||!end) { toast('Fill all fields','error'); return; }
  if (start>=end) { toast('End must be after start','error'); return; }
  const booking = {

<script>
// ══════════════════════════════════════════════
//  URL ROUTING PATCH
//  Adds /pagename URLs without changing any logic
// ══════════════════════════════════════════════
(function() {
  // Wait for app to be ready
  function patchRouter() {
    if (typeof navigateWithMobile !== 'function') {
      setTimeout(patchRouter, 100);
      return;
    }

    const VALID_PAGES = ['dashboard','schedule','tasks','faculty','availability',
                         'batches','subjects','reports','settings','studio'];

    // Store original navigate
    const _orig = window.navigate;

    // Override navigate to also update URL
    window.navigate = function(page) {
      _orig(page);
      const path = '/' + page;
      if (location.pathname !== path) {
        history.pushState({ page }, '', path);
      }
    };

    // Handle browser back/forward
    window.addEventListener('popstate', function(e) {
      const page = e.state?.page || location.pathname.replace('/', '') || 'schedule';
      if (VALID_PAGES.includes(page)) {
        _orig(page); // use original to avoid double pushState
      }
    });

    // On first load, navigate to URL path if valid
    const initPage = location.pathname.replace('/', '').replace(/\/+$/, '');
    if (VALID_PAGES.includes(initPage) && typeof currentUser !== 'undefined' && currentUser) {
      window.navigate(initPage);
    }
  }

  // Start patching after scripts load
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', patchRouter);
  } else {
    patchRouter();
  }
})();
</script>
